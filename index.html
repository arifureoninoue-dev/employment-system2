                        'DesiredHeight__c','DesiredBodyWeight__c',
                        'DominantHand_TT__c','Glasses__c','Tattoo__c','Marriage_TT__c',
                        'Smoking__c','Drinking__c','FieldExperience_TT__c',
                        'dk_TotalBasicBreakTime__c', 'dk_ScheduledWorkingHoursPerDay__c', 'dk_ScheduledWorkingMinutesPerDay__c',
                        
                        'RecordTypeId', 'JobStatus__c', 'JobAcquisitionDate__c', 'BusinessType__c', 'ResponsibleBranch__c'
                    ];

                    // ─── 一時保存用列定義（既存のCSV_COLUMNS）────────────────────
                    const CSV_COLUMNS = FIELDS.filter(f => f.type !== 'section').map(f => f.id);
                    const sfToId = {};
                    const fieldTypeMap = {};
                    const fieldDefMap = {};
                    // 全API名（account/job/overseas_job）→ tool_id の逆引きマップを構築
                    FIELDS.filter(f => f.type !== 'section').forEach(f => { 
                        if (f.sf_mapping) {
                            if (f.sf_mapping.account)      sfToId[f.sf_mapping.account] = f.id;
                            if (f.sf_mapping.job)          sfToId[f.sf_mapping.job] = f.id;
                            if (f.sf_mapping.overseas_job) sfToId[f.sf_mapping.overseas_job] = f.id;
                        }
                        sfToId[f.id] = f.id;
                        fieldTypeMap[f.id] = f.type;
                        fieldDefMap[f.id] = f;
                     });
                    // ─── 後方互換：旧一時保存CSVのヘッダー（旧 sf 値）からも逆引き可能にする ────
                    // 旧FIELDS定義で sf に設定されていた「_xxx」形式の内部IDや、
                    // 現行ツールIDと異なる旧命名をここで吸収する
                    const LEGACY_SF_TO_ID = {
                        '_business_type': 'business_type',
                        '_shift_daily_minutes_1': 'shift_daily_minutes_1',
                        '_shift_daily_minutes_2': 'shift_daily_minutes_2',
                        '_shift_daily_minutes_3': 'shift_daily_minutes_3',
                        '_shift_daily_minutes_4': 'shift_daily_minutes_4',
                        '_shift_daily_minutes_5': 'shift_daily_minutes_5',
                        '_has_allowance': 'has_allowance',
                        '_pension_standard_remuneration': 'pension_standard_remuneration',
                        '_net_income': 'net_income',
                        '_wage_cutoff_day_1': 'wage_cutoff_day_1',
                        '_wage_payment_month_1': 'wage_payment_month_1',
                        '_wage_payment_day_type_1': 'wage_payment_day_type_1',
                        '_wage_cutoff_day_2': 'wage_cutoff_day_2',
                        '_wage_payment_month_2': 'wage_payment_month_2',
                        '_wage_payment_day_type_2': 'wage_payment_day_type_2',
                        '_health_checkup_first': 'health_checkup_first',
                        '_health_checkup_confirmed': 'health_checkup_schedule_confirmed',
                        'health_standard_remuneration': 'health_standard_remuneration',
                    };
                    Object.entries(LEGACY_SF_TO_ID).forEach(([k, v]) => { if (!sfToId[k]) sfToId[k] = v; });

                    // ─── 共通：行データ生成関数 ──────────────────────────────────
                    const buildWageText = (cutoffType, cutoffDay, paymentMonth, paymentDayType, paymentDay) => {
                        const cutoff = cutoffType === '末日' ? '末日' : (cutoffDay ? `当月${cutoffDay}日` : '');
                        const payment = paymentMonth && (paymentDayType === '末日' ? `${paymentMonth}末日` : (paymentDay ? `${paymentMonth}${paymentDay}日` : ''));
                        return { cutoff, payment };
                    };

                    const toolToSfMap = {
                        '男性': 'Male', '女性': 'Female',
                        '既婚可': '既婚', '必要': '要',
                    };

                    const fieldSpecificToSf = {
                        'irregular_holiday': { 'なし': '' }, // ★ 追加: 非定休日が「なし」なら空欄を出力
                    };

                    const buildRow = (d, columns, wageOverride, isSfExport = false, exportType = 'save') => {
                        const values = columns.map(sf => {
                            if (sf === '' || sf === '-') return '';
                            if (wageOverride && wageOverride[sf] !== undefined) return escapeCSV(wageOverride[sf]);
                            let fieldId = sfToId[sf];
                            if (sf === 'Address__c') {
                                fieldId = (exportType === 'account') ? 'address' : 'workplace_address';
                            } else if (sf === 'PlacementDate__c') {
                                fieldId = 'placement_date'; // UIで同期しているためどちらでも良いが明示
                            }
                            if (!fieldId) return '';
                            
                            // ★ 変更：Salesforce向け出力の時だけ、非表示項目を空欄にする
                            if (isSfExport) {
                                const fieldDef = fieldDefMap[fieldId];
                                if (fieldDef && fieldDef.showIf && !fieldDef.showIf(d)) {
                                    return '';
                                }
                            }
                            
                            let val = d[fieldId];
                            if (isSfExport && fieldTypeMap[fieldId] === 'time' && val) {
                                // "09:00" のような形式を "09:00:00.000Z" に変換
                                if (/^\d{2}:\d{2}$/.test(val)) {
                                    val = `${val}:00.000Z`;
                                } else if (/^\d{2}:\d{2}:\d{2}$/.test(val)) {
                                    val = `${val}.000Z`;
                                }
                            }

                            if (Array.isArray(val)) return escapeCSV(val.join('・'));
                            let strVal = val != null ? String(val) : '';
                            
                            // ★ 変更: Salesforce出力の時のみ、文言の変換（あり/なし/空欄など）を実行する
                            if (isSfExport) {
                                if (fieldSpecificToSf[fieldId] && fieldSpecificToSf[fieldId][strVal] !== undefined) {
                                    strVal = fieldSpecificToSf[fieldId][strVal];
                                } else if (toolToSfMap[strVal] !== undefined) {
                                    strVal = toolToSfMap[strVal];
                                }
                            }
                            return escapeCSV(strVal);
                        });
                        return values;
                    };

                    const targetRecords = dataList.filter(d => d.bu === appMode && (appMode !== 'skilled' || d.sub_type === subMode));
                    const dateStr = new Date().toISOString().split('T')[0];

                    // ─── 海外招聘求人票オブジェクト用列定義（FIELDS順で動的生成）─────
                    const OVERSEAS_JOB_COLUMNS = [];
                    const seenOverseas = new Set();
                    FIELDS.forEach(f => {
                        if (f.type === 'section') return;
                        const api = f.sf_mapping && f.sf_mapping.overseas_job;
                        if (!api || seenOverseas.has(api)) return;
                        seenOverseas.add(api);
                        OVERSEAS_JOB_COLUMNS.push(api);
                    });

                    // ─── ファイル名生成ヘルパー ──────────────────────────────────
                    // 企業名（先頭レコードの Name）をファイル名に使用
                    // - 使えない文字( / \ : * ? " < > | ) は '_' に置換
                    // - 空の場合は「未設定」
                    const sanitizeForFilename = (s) => {
                        if (!s) return '未設定';
                        return String(s).replace(/[\/\\:*?"<>|]/g, '_');
                    };
                    const firstCompanyName = sanitizeForFilename(targetRecords[0] && targetRecords[0].company_name);
                    const makeFilename = (prefix) => `SF_${prefix}_${firstCompanyName}_${dateStr}.csv`;

                    const downloadCSV = (filename, header, rows) => {
                        const csv = '\uFEFF' + [header, ...rows].join('\n');
                        const url = URL.createObjectURL(new Blob([csv], { type: 'text/csv;charset=utf-8' }));
                        const a = document.createElement('a');
                        a.href = url;
                        a.download = filename;
                        a.click();
                        URL.revokeObjectURL(url);
                    };

                    const saveHeader = ['ID', 'bu', 'sub_type', ...CSV_COLUMNS,  '_memo'].join(',');
                    const saveRows = targetRecords.map(d => {
                        const fieldValues = buildRow(d, CSV_COLUMNS, null, false,'save');
                        return [escapeCSV(d.id), escapeCSV(d.bu), escapeCSV(d.sub_type || ''), ...fieldValues, escapeCSV(d._memo || '')].join(',');
                    });
                    downloadCSV(makeFilename('一時保存'), saveHeader, saveRows);
                    // ★ エラーがある場合はここで処理を終了し、メッセージを表示
                    if (hasError) {
                        notify('エラーがあるため、一時保存用CSVのみ出力しました', 'warning');
                        return;
                    }

                    // ※ 取引先はNameが必須IDとして先頭に来ることが多いため、headerはAPI名のみ
                    const accountHeader2 = ACCOUNT_COLUMNS.join(',');
                    const accountRows = targetRecords.map(d =>
                        buildRow(d, ACCOUNT_COLUMNS, null, true,'account').join(',')
                    );
                    downloadCSV(makeFilename('取引先'), accountHeader2, accountRows);

                    // ③ ジョブ用 or 海外招聘求人票用CSV（モードで分岐）
                    if (isLV) {
                        // ─── 海外招聘求人票CSV（LV時のみ） ──────────────────────
                        const overseasWageOverrideFor = (d) => {
                            const w1 = buildWageText(d.wage_cutoff_type_1, d.wage_cutoff_day_1, d.wage_payment_month_1, d.wage_payment_day_type_1, d.wage_payment_day_1);
                            const w2 = buildWageText(d.wage_cutoff_type_2, d.wage_cutoff_day_2, d.wage_payment_month_2, d.wage_payment_day_type_2, d.wage_payment_day_2);
                            const overrides = {
                                'WageDeadline__c': w1.cutoff, 'WagePaymentDate__c': w1.payment,
                                'WageDeadline2__c': w2.cutoff, 'WagePaymentDate2__c': w2.payment,
                            };
                            // 居住費種別が「実費」の場合は、金額欄に「実費」という文字列を出力
                            if (d.housing_fee_type === '実費') {
                                overrides['HousingCostDeductionAmount__c'] = '実費';
                            }
                            return overrides;
                        };
                        const overseasHeader = OVERSEAS_JOB_COLUMNS.join(',');
                        const overseasRows = targetRecords.map(d =>
                            buildRow(d, OVERSEAS_JOB_COLUMNS, overseasWageOverrideFor(d), true, 'overseas_job').join(',')
                        );
                        downloadCSV(makeFilename('海外招聘求人票'), overseasHeader, overseasRows);
                    } else {
                        // ─── 既存のジョブCSV（技能実習・特定技能AJS） ────────────
                        const jobWageOverrideFor = (d) => {
                            const w1 = buildWageText(d.wage_cutoff_type_1, d.wage_cutoff_day_1, d.wage_payment_month_1, d.wage_payment_day_type_1, d.wage_payment_day_1);
                            const w2 = buildWageText(d.wage_cutoff_type_2, d.wage_cutoff_day_2, d.wage_payment_month_2, d.wage_payment_day_type_2, d.wage_payment_day_2);
                            const extraNotes = [];
                            if (d.high_altitude_height) extraNotes.push(`高所作業の高さ: ${d.high_altitude_height}m`);
                            if (d.full_harness_training) extraNotes.push(`フルハーネス特別教育: ${d.full_harness_training}`);
                            if (d.avg_overtime_hours) extraNotes.push(`残業月平均: ${d.avg_overtime_hours}時間`);
                            if (d.nightshift_count) extraNotes.push(`夜勤月回数: ${d.nightshift_count}回`);
                            if (d.priority_1) extraNotes.push(`優先順位1: ${d.priority_1}`);
                            if (d.priority_2) extraNotes.push(`優先順位2: ${d.priority_2}`);
                            if (d.priority_3) extraNotes.push(`優先順位3: ${d.priority_3}`);
                            // もともと「送出機関への共有事項」に入力されていたテキストがあれば繋げる
                            let sharedMatters = d.sending_org_notes || '';
                            if (extraNotes.length > 0) {
                                if (sharedMatters) sharedMatters += '\n\n';
                                sharedMatters += extraNotes.join('\n');
                            }
                            return {
                                'WageDeadline__c': w1.cutoff, 'WagePaymentDate__c': w1.payment,
                                'dk_WageDeadline2__c': w2.cutoff, 'dk_WagePaymentDate2__c': w2.payment,
                                'RecordTypeId': '012TL00000ASkGgYAL',
                                'JobStatus__c': 'オープン',
                                'JobAcquisitionDate__c': dateStr, // エクスポートした日付（YYYY-MM-DD）
                                'BusinessType__c': 'TechnicalInternTraining',
                                'ResponsibleBranch__c': 'GS',
                                'SharedMattersToSendingAgency__c': sharedMatters
                            };
                        };
                        const jobHeader = JOB_COLUMNS.join(',');
                        const jobRows = targetRecords.map(d =>
                            buildRow(d, JOB_COLUMNS, jobWageOverrideFor(d), true,'job').join(',')
                        );
                        downloadCSV(makeFilename('ジョブ'), jobHeader, jobRows);
                    }
                    notify('Salesforceインポート用を含む3ファイルを出力しました', 'success');
                } catch (e) {
                    console.error(e);
                    notify('CSVの出力に失敗しました', 'error');
                }
            };
            // ─── 【変更②】CSVインポート ──────────────────────────────────────────
            // csvImportType('save' or 'past_data') に応じて処理を切り替え
            const importCSV = (e) => {
            const file = e.target.files[0];
            if (!file) return;
            e.target.value = '';

            const importType = csvImportType;   // 'save' | 'past_data'
            setCsvImportType(null);             // モーダル状態クリア

            const reader = new FileReader();
            reader.onload = (evt) => {
                try {
                    // BOM除去
                    const text = evt.target.result.replace(/^\uFEFF/, '');
                    const lines = text.split('\n').filter(l => l.trim() !== '');
                    if (lines.length < 2) { notify('データが含まれていません', 'error'); return; }

                    // ─── ヘッダー取得（1行目がAPI名、2行目以降がデータ）────────────────
                    const apiHeaders = parseCSVLine(lines[0]);
                    const dataStartRow = 1;

                    // ─── CSV種別に応じた妥当性チェック ────────────────────────────────
                    const hasIdBu = apiHeaders.includes('ID') && apiHeaders.includes('bu');

                    if (importType === 'save') {
                        // 一時保存CSV: ID列とbu列が必須
                        if (!hasIdBu) {
                            notify('一時保存CSVではありません。「ID」列と「bu」列を含むファイルを選択してください。', 'error');
                            return;
                        }
                    } else if (importType === 'past_data') {
                        // 過去データCSV: 現在モードに応じたヘッダー整合チェック
                        const isLV = (appMode === 'skilled' && subMode === '海外招聘(LV)');
                        if (isLV) {
                            // LVモード: JobField__c 必須、Occupation_TT__c はあってはならない
                            if (!apiHeaders.includes('JobField__c')) {
                                notify('海外招聘(LV)モードでは、JobField__c列を含む海外招聘求人票のCSVが必要です。', 'error');
                                return;
                            }
                            if (apiHeaders.includes('Occupation_TT__c')) {
                                notify('海外招聘(LV)モードに、技能実習用のCSV（Occupation_TT__c列を含む）は読み込めません。', 'error');
                                return;
                            }
                        } else {
                            // 技能実習・特定技能AJSモード: Occupation_TT__c 必須、JobField__c はあってはならない
                            if (!apiHeaders.includes('Occupation_TT__c')) {
                                notify(`${appMode === 'intern' ? '技能実習' : '特定技能'}モードでは、Occupation_TT__c列を含むジョブのCSVが必要です。`, 'error');
                                return;
                            }
                            if (apiHeaders.includes('JobField__c')) {
                                notify(`${appMode === 'intern' ? '技能実習' : '特定技能'}モードに、海外招聘(LV)用のCSV（JobField__c列を含む）は読み込めません。`, 'error');
                                return;
                            }
                        }
                    }

                    // sf → id の逆引きマップを生成
                    const sfToId = {};
                    const fieldTypeMap = {}; // ★フィールドの型を判定するためのマップ
                    // 全API名（account/job/overseas_job）→ tool_id の逆引きマップを構築
                    FIELDS.filter(f => f.type !== 'section').forEach(f => { 
                        if (f.sf_mapping) {
                            if (f.sf_mapping.account)      sfToId[f.sf_mapping.account] = f.id;
                            if (f.sf_mapping.job)          sfToId[f.sf_mapping.job] = f.id;
                            if (f.sf_mapping.overseas_job) sfToId[f.sf_mapping.overseas_job] = f.id;
                        }
                        sfToId[f.id] = f.id; 
                        fieldTypeMap[f.id] = f.type;
                    });
                    // ─── 後方互換：旧一時保存CSVのヘッダー（旧 sf 値）からも逆引き可能にする ────
                    const LEGACY_SF_TO_ID = {
                        '_business_type': 'business_type',
                        '_shift_daily_minutes_1': 'shift_daily_minutes_1',
                        '_shift_daily_minutes_2': 'shift_daily_minutes_2',
                        '_shift_daily_minutes_3': 'shift_daily_minutes_3',
                        '_shift_daily_minutes_4': 'shift_daily_minutes_4',
                        '_shift_daily_minutes_5': 'shift_daily_minutes_5',
                        '_has_allowance': 'has_allowance',
                        '_pension_standard_remuneration': 'pension_standard_remuneration',
                        '_net_income': 'net_income',
                        '_wage_cutoff_day_1': 'wage_cutoff_day_1',
                        '_wage_payment_month_1': 'wage_payment_month_1',
                        '_wage_payment_day_type_1': 'wage_payment_day_type_1',
                        '_wage_cutoff_day_2': 'wage_cutoff_day_2',
                        '_wage_payment_month_2': 'wage_payment_month_2',
                        '_wage_payment_day_type_2': 'wage_payment_day_type_2',
                        '_health_checkup_first': 'health_checkup_first',
                        '_health_checkup_confirmed': 'health_checkup_schedule_confirmed',
                        'health_standard_remuneration': 'health_standard_remuneration',
                    };
                    Object.entries(LEGACY_SF_TO_ID).forEach(([k, v]) => { if (!sfToId[k]) sfToId[k] = v; });

                    // 列インデックスを取得（一時保存CSVのみ ID/bu/sub_type/_memo を持つ）
                    // SFエクスポートCSVでは小文字 'Id' が使われるため両方対応
                    const idxId       = apiHeaders.indexOf('ID') >= 0 ? apiHeaders.indexOf('ID') : apiHeaders.indexOf('Id');
                    const idxBu       = apiHeaders.indexOf('bu');
                    const idxSubType  = apiHeaders.indexOf('sub_type');
                    const idxMemo     = apiHeaders.indexOf('_memo');

                    let importedCount = 0;
                    let skippedCount = 0;
                    const newRecords = [];

                    for (let i = dataStartRow; i < lines.length; i++) {
                        const values = parseCSVLine(lines[i]);
                        if (values.length < 2) continue;

                        const rowId = idxId >= 0 ? values[idxId] : null;
                        const rowBu = idxBu >= 0 ? values[idxBu] : null;
                        const rowSubType = idxSubType >= 0 ? values[idxSubType] : null; 

                        // 一時保存CSVのみbuチェック（過去データCSVは現在のappModeで取り込む）
                        if (importType === 'save' && rowBu !== appMode) {
                            skippedCount++;
                            continue;
                        }

                        // 新規IDを発行
                        const newId = `SF-${Math.random().toString(36).slice(2, 11).toUpperCase()}`;

                        const record = {
                            id: newId,
                            bu: importType === 'save' ? rowBu : appMode,
                            sub_type: importType === 'save' ? rowSubType : subMode,
                            createdAt: new Date().toISOString(),
                            _originalId: rowId,
                        };

                        // 各カラムをフィールドIDにマッピング
                        const isJobFile = apiHeaders.includes('Occupation_TT__c');
                        apiHeaders.forEach((sfName, colIdx) => {
                            if (sfName === 'ID' || sfName === 'Id' || sfName === 'bu' || sfName === '_memo') return;
                            let fieldId = sfToId[sfName];
                            if (sfName === 'Address__c') {
                                // Address__c は取引先とジョブで意味が異なる
                                // - 過去データCSVで Occupation_TT__c を含む場合: workplace_address として扱う（ジョブ側の住所）
                                // - それ以外（一時保存CSV or 取引先のみ）: 現状のマッピングに従う
                                fieldId = isJobFile ? 'workplace_address' : 'address';
                            }
                            // 配属希望日を両方のIDに割り当てる
                            if (sfName === 'PlacementDate__c') {
                                const dateVal = values[colIdx] || '';
                                record['desired_start_date'] = dateVal;
                                record['placement_date'] = dateVal;
                            }
                            if (!fieldId) return;
                            let rawVal = values[colIdx] || '';
                            if (MULTISELECT_FIELD_IDS.includes(fieldId)) {
                                // 区切り文字: 一時保存CSVは '・'、過去データCSV(SF形式)は '、'（データローダーは ';'）
                                // ここでは '・' と '、' と ';' のいずれでも分割可能にする
                                const sep = importType === 'save' ? '・' : /[、;]/;
                                let vals = rawVal ? rawVal.split(sep) : [];
                                // 過去データCSV: 「月」→「月曜日」のように「曜日」を補完
                                if (importType === 'past_data' && fieldId === 'regular_holiday_day') {
                                    vals = vals.map(v => v.length === 1 ? v + '曜日' : v);
                                }
                                record[fieldId] = vals;
                            } else {
                                if (importType === 'past_data') {
                                    // 時刻の復元処理（過去データCSV時のみ）
                                    if (fieldTypeMap[fieldId] === 'time' && rawVal) {
                                        const timeMatch = rawVal.match(/^(\d{1,2}):(\d{1,2})/);
                                        if (timeMatch) {
                                            rawVal = timeMatch[1].padStart(2, '0') + ':' + timeMatch[2].padStart(2, '0');
                                        }
                                    }
                                    // カンマ付き数値のカンマを除去
                                    rawVal = rawVal.replace(/^[\d,]+$/, v => v.replace(/,/g, ''));
                                    // SF値 → ツール値 の共通変換マップ
                                    const sfValMap = {
                                        'Male': '男性', 'Female': '女性',
                                        '既婚': '既婚可', '要': '必要',
                                    };
                                    if (sfValMap[rawVal] !== undefined) rawVal = sfValMap[rawVal];
                                    if (fieldId === 'irregular_holiday' && rawVal === '') rawVal = 'なし';
                                }
                                record[fieldId] = rawVal;
                            }
                        });

                        // _memo の復元（一時保存CSVのみ）
                        if (idxMemo >= 0) record._memo = values[idxMemo] || '';

                        // LV過去データCSV: HousingCostDeductionAmount__c に「実費」文字列が入っていたケースの逆変換
                        // - 「実費」文字列 → housing_fee_type='実費'、housing_fee_monthly=''
                        // - 数値         → housing_fee_type='実費以外'、housing_fee_monthly=数値
                        // ※ 一時保存CSVは housing_fee_type がそのまま列にあるので変換不要
                        if (importType === 'past_data' && (appMode === 'skilled' && subMode === '海外招聘(LV)')) {
                            const hv = record.housing_fee_monthly;
                            if (hv === '実費') {
                                record.housing_fee_type = '実費';
                                record.housing_fee_monthly = '';
                            } else if (hv && hv !== '') {
                                record.housing_fee_type = '実費以外';
                            }
                        }

                        // 以下の自動計算は過去データCSV時のみ実行
                        if (importType === 'past_data') {
                            // 年所定労働時間から月所定労働時間を自動計算
                            const annMin = (parseInt(record.annual_work_hours) || 0) * 60 + (parseInt(record.annual_work_minutes) || 0);
                            if (annMin > 0) {
                                const mTotal = Math.round(annMin / 12);
                                record.monthly_work_hours = String(Math.floor(mTotal / 60));
                                record.monthly_work_minutes = String(mTotal % 60);
                            }
                            // 手取り額の自動計算（インポート時）
                            const salaryKey = record.residence_status === '実習2号' ? 'monthly_salary_2'
                                            : record.residence_status === '実習3号' ? 'monthly_salary_3'
                                            : 'monthly_salary_1';
                            const monthlySalary = parseFloat(record[salaryKey]) || 0;
                            const socialInsurance = parseFloat(record.social_insurance_total) || 0;
                            const incomeTax       = parseFloat(record.income_tax) || 0;
                            const laborInsurance  = parseFloat(record.labor_insurance_total) || 0;
                            const housingFee      = (record.housing_fee_type === '実費') ? 0 : (parseFloat(record.housing_fee_monthly) || 0);
                            let otherCostTotal = 0;
                            if (record.has_other_fees === 'あり') {
                                [1,2,3,4].forEach(n => {
                                    otherCostTotal += parseFloat(record[`other_cost_amount_${n}`]) || 0;
                                });
                            }
                            if (monthlySalary > 0) {
                                const net = monthlySalary - socialInsurance - incomeTax - laborInsurance - housingFee - otherCostTotal;
                                record.net_income = String(Math.round(net));
                            }

                            // LVモードのみ: その他控除額合計と支払概算額の自動計算
                            if (appMode === 'skilled' && subMode === '海外招聘(LV)') {
                                let otherDeductTotal = 0;
                                [1,2,3,4,5].forEach(n => {
                                    otherDeductTotal += parseFloat(record[`other_deduction_amount_${n}`]) || 0;
                                });
                                record.other_cost_deduction_amount = String(otherDeductTotal);

                                if (record.payment_type === '月給') {
                                    const monthlyWage = parseFloat(record.monthly_wage) || 0;
                                    if (monthlyWage > 0) {
                                        const uc  = parseFloat(record.utility_cost_deduction_amount) || 0;
                                        const fc  = parseFloat(record.food_cost_deduction_amount) || 0;
                                        const net = monthlyWage - socialInsurance - incomeTax - laborInsurance - housingFee - uc - fc - otherDeductTotal;
                                        record.net_salary = String(Math.round(net));
                                    }
                                }
                            }
                        }
                        newRecords.push(record);
                        importedCount++;
                    }

                    if (importedCount === 0) {
                        const detail = skippedCount > 0 ? `（${skippedCount}件はモード不一致でスキップ）` : '';
                        notify(`読み込めるレコードがありませんでした${detail}`, 'warning');
                        return;
                    }

                    setDataList(prev => [...prev, ...newRecords]);
                    setCurrentId(newRecords[0].id);
                    setCurrentTab(1);

                    const formatLabel = importType === 'past_data' ? '（過去データCSV）' : '（一時保存CSV）';
                    const skipLabel = skippedCount > 0 ? `（${skippedCount}件はモード不一致でスキップ）` : '';
                    notify(`${importedCount}件を読み込みました${formatLabel}${skipLabel}`);
                } catch (err) {
                    console.error(err);
                    notify('CSVの読み込みに失敗しました', 'error');
                }
            };
            reader.readAsText(file, 'Shift_JIS');
        };

            const validate = (data) => {
                const errors = [];
                if (!data) return errors;
                FIELDS.filter(f => f.bu?.includes(data.bu)).forEach(f => {
                    if (f.showIf && !f.showIf(data)) return;
                    const val = data[f.id];
                    const isEmpty = !val || (Array.isArray(val) && val.length === 0);
                    if (f.req && isEmpty) errors.push({ field: f.id, msg: `${f.label}は必須項目です。` });
                    if (f.req_cond && f.req_cond(data) && isEmpty) errors.push({ field: f.id, msg: `${f.label}は必須項目です。` });
                    if (data[f.id] && f.val === 'noFullLatin' && containsFullWidthLatin(data[f.id])) errors.push({ field: f.id, msg: `${f.label}に含まれる英数字は半角で入力してください（全角が含まれています）。` });
                    if (data[f.id] && f.val === 'half' && !isHalfWidth(data[f.id])) errors.push({ field: f.id, msg: `${f.label}は半角英数字のみです。` });
                    if (data[f.id] && f.val === 'num' && !isNumeric(data[f.id])) errors.push({ field: f.id, msg: `${f.label}は半角数字のみです。` });
                    if (data[f.id] && f.val === 'zip' && !isZipCode(data[f.id])) errors.push({ field: f.id, msg: `${f.label}は「000-0000」の形式（半角数字3桁＋ハイフン＋4桁）で入力してください。` });
                    if (data[f.id] && f.val === 'hiragana' && !isHiragana(data[f.id])) errors.push({ field: f.id, msg: `${f.label}はひらがなで入力してください。` });
                });
                //代表者名の半角スペースチェック
                const spaceCheckFields = [
                    { id: 'rep_name', label: '代表者名' },
                    { id: 'rep_name_en', label: '代表者名(英)' }
                ];
                if (data.sub_type === '海外招聘(LV)') {
                    spaceCheckFields.push({ id: 'rep_name_kana', label: '代表者名（かな）' });
                    spaceCheckFields.push({ id: 'pic_employment_name_kana', label: '雇用改善の窓口 担当者氏名ふりがな' });
                }

                spaceCheckFields.forEach(f => {
                    const val = data[f.id];
                    if (val) {
                        // 半角スペースが含まれていない、または全角スペースが含まれている場合はエラー
                        if (!val.includes(' ') || val.includes('　')) {
                            errors.push({ field: f.id, msg: `${f.label}は半角スペースを入れてください（全角スペースは不可です）。` });
                        }
                    }
                });
                //住所の全角スペース・全角数字チェック
                const addressCheckFields = [
                    { id: 'address', label: '所在地(拠点)' },
                    { id: 'workplace_address', label: '勤務住所' },
                    { id: 'housing_address', label: '宿泊施設住所' }
                ];
                addressCheckFields.forEach(f => {
                    const val = data[f.id];
                    if (val) {
                        if (val.includes('　')) {
                            errors.push({ field: f.id, msg: `${f.label}に全角スペースが含まれています。半角スペースを使用するか、スペースを削除してください。` });
                        }
                        if (/[０-９]/.test(val)) {
                            errors.push({ field: f.id, msg: `${f.label}に全角数字（１、２など）が含まれています。数字は必ず半角（1、2など）で入力してください。` });
                        }
                    }
                });
                //住所(英)のJapan・郵便番号チェック
                const addressEnVal = data.address_en;
                if (addressEnVal) {
                    // 大文字・小文字問わず「japan」が含まれているかチェック
                    if (/japan/i.test(addressEnVal)) {
                        errors.push({ field: 'address_en', msg: `住所(英)に「Japan」を含めることはできません。都道府県名から入力してください。` });
                    }
                    // 郵便番号（例: 123-4567 や 1234567、あるいは 〒）が含まれているかチェック
                    if (/\d{3}-?\d{4}/.test(addressEnVal) || /〒/.test(addressEnVal)) {
                        errors.push({ field: 'address_en', msg: `住所(英)に郵便番号を含めることはできません。都道府県名から入力してください。` });
                    }
                }
                //手当の「中途半端な入力」を防ぐバリデーション
                if (data.has_allowance === 'あり') {
                    for (let i = 1; i <= 4; i++) {
                        const name = data[`allowance_name_${i}`];
                        const amount = data[`allowance_amount_${i}`];
                        const calc = data[`allowance_calc_${i}`];

                        if (name || amount || calc) {
                            if (!name) errors.push({ field: `allowance_name_${i}`, msg: `手当セット${i}: 「手当名」が未入力です。` });
                            if (!amount) errors.push({ field: `allowance_amount_${i}`, msg: `手当セット${i}: 「手当額」が未入力です。` });
                        }
                    }
                }
                // 賞与・昇給・退職金の詳細バリデーション
                if (data.has_bonus === 'あり') {
                    if (!data.bonus_amount) errors.push({ field: 'bonus_amount', msg: '賞与セット: 「支給額」が未入力です。' });
                    if (!data.bonus_remarks) errors.push({ field: 'bonus_remarks', msg: '賞与セット: 「詳細」が未入力です。' });
                }
                if (data.has_raise === 'あり') {
                    if (!data.wage_raise_amount) errors.push({ field: 'wage_raise_amount', msg: '昇給セット: 「昇給額」が未入力です。' });
                    if (!data.wage_raise_remarks) errors.push({ field: 'wage_raise_remarks', msg: '昇給セット: 「詳細」が未入力です。' });
                }
                if (data.has_retirement === 'あり') {
                    if (!data.retirement_amount) errors.push({ field: 'retirement_amount', msg: '退職金セット: 「支給金額」が未入力です。' });
                    if (!data.retirement_remarks) errors.push({ field: 'retirement_remarks', msg: '退職金セット: 「詳細」が未入力です。' });
                }
                if (data.has_other_fees === 'あり') {
                    for (let i = 1; i <= 4; i++) {
                        const name = data[`other_cost_name_${i}`];
                        const type = data[`other_cost_type_${i}`];
                        const amount = data[`other_cost_amount_${i}`];

                        if (name || type || amount) {
                            if (!name) errors.push({ field: `other_cost_name_${i}`, msg: `その他費用セット${i}: 「名称」が未入力です。` });
                            if (!type) errors.push({ field: `other_cost_type_${i}`, msg: `その他費用セット${i}: 「種別」が未選択です。` });
                            if (type === '実費以外' && !amount) {
                                errors.push({ field: `other_cost_amount_${i}`, msg: `その他費用セット${i}: 実費以外を選択した場合は「金額」の入力が必要です。` });
                            }
                        }
                    }
                }
                const LAW_MSG = '労働基準法に違反していないか確認をしてください';
                const dwh = parseInt(data.daily_work_hours), dwm = parseInt(data.daily_work_minutes);
                if (!isNaN(dwh) && dwh > 8) errors.push({ field: 'daily_work_hours', msg: `1日の所定労働時間が8時間を超えています。${LAW_MSG}` });
                if (!isNaN(dwh) && !isNaN(dwm) && dwh === 8 && dwm > 0) errors.push({ field: 'daily_work_minutes', msg: `1日の所定労働時間が8時間を超えています。${LAW_MSG}` });
                const wwh = parseInt(data.weekly_work_hours), wwm = parseInt(data.weekly_work_minutes);
                if (!isNaN(wwh) && wwh > 40) errors.push({ field: 'weekly_work_hours', msg: `週所定労働時間が40時間を超えています。${LAW_MSG}` });
                if (!isNaN(wwh) && !isNaN(wwm) && wwh === 40 && wwm > 0) errors.push({ field: 'weekly_work_minutes', msg: `週所定労働時間が40時間を超えています。${LAW_MSG}` });
                const ayh = parseInt(data.annual_work_hours), aym = parseInt(data.annual_work_minutes);
                if (!isNaN(ayh) && ayh > 2085) errors.push({ field: 'annual_work_hours', msg: `年所定労働時間が2085時間を超えています。${LAW_MSG}` });
                if (!isNaN(ayh) && !isNaN(aym) && ayh === 2085 && aym > 42) errors.push({ field: 'annual_work_minutes', msg: `年所定労働時間が2085時間42分を超えています。${LAW_MSG}` });
                const ah = parseInt(data.annual_holidays);
                if (!isNaN(ah)) {
                    if (ah <= 52) errors.push({ field: 'annual_holidays', msg: `年間休日数が52日以下です。${LAW_MSG}` });
                    const holidays = data.national_holidays === '祝日休み';
                    const selectedDays = Array.isArray(data.regular_holiday_day) ? data.regular_holiday_day.length : 0;
                    if (holidays && selectedDays >= 2 && ah <= 120) errors.push({ field: 'annual_holidays', msg: `祝日休み・週2日休みの設定で年間休日が120日以下です。${LAW_MSG}` });
                    const calcDwh = parseInt(data.daily_work_hours) || 0;
                    const calcDwm = parseInt(data.daily_work_minutes) || 0;
                    const inputAnnualMin = (parseInt(data.annual_work_hours) || 0) * 60 + (parseInt(data.annual_work_minutes) || 0);

                    // 入力値が存在し、かつ「交代制」と「変形労働制」ではない場合のみ計算
                    if (inputAnnualMin > 0 && (calcDwh > 0 || calcDwm > 0) && data.has_shift === 'なし' && data.has_flex_time === 'なし') {
                        let satMin = 0;
                        if (data.saturday_work === 'あり' && data.other_start_time && data.other_end_time) {
                            const t2m = (t) => { if(!t) return 0; const [h,m] = t.split(':').map(Number); return h * 60 + m; };
                            const s = t2m(data.other_start_time);
                            const e = t2m(data.other_end_time);
                            const b = parseInt(data.other_break_total_minutes) || 0;
                            if (e > s) satMin = Math.max(0, e - s - b);
                        }

                        const totalWorkDays = 365 - ah; // 1年の総出勤日数
                        let weekdayDays = 0;
                        let satDays = 0;

                        if (data.saturday_work === 'あり') {
                            if (totalWorkDays > 260) {
                                weekdayDays = 260; // 平日は最大260日
                                satDays = totalWorkDays - 260; // はみ出た分を土曜出勤とする
                            } else {
                                weekdayDays = totalWorkDays;
                                satDays = 0;
                            }
                        } else {
                            weekdayDays = totalWorkDays;
                            satDays = 0;
                        }

                        // 土曜出勤「あり」でも時間が未入力の場合は一時的にエラーをスキップする（入力途中の混乱を防ぐため）
                        const canCalculate = data.saturday_work === 'なし' || (data.saturday_work === 'あり' && satMin > 0);

                        if (canCalculate) {
                            const calcTotalMin = (weekdayDays * (calcDwh * 60 + calcDwm)) + (satDays * satMin);
                            if (calcTotalMin !== inputAnnualMin) {
                                const calcH = Math.floor(calcTotalMin / 60);
                                const calcM = calcTotalMin % 60;
                                const timeStr = calcM > 0 ? `${calcH}時間${calcM}分` : `${calcH}時間`;
                                
                                let detailStr = `平日${weekdayDays}日×1日の所定時間`;
                                if (satDays > 0) {
                                    detailStr += ` ＋ 土曜出勤${satDays}日×土曜日の所定時間`;
                                }
                                
                                errors.push({
                                    field: 'annual_work_hours',
                                    msg: `年所定労働時間が正しくありません。理論値は【 ${timeStr} 】です。（計算式: 365日 - 休日${ah}日 = 出勤${totalWorkDays}日 / 内訳: ${detailStr}）`
                                });
                            }
                        }
                    }
                }
                const nightCount = parseInt(data.nightshift_count);
                if (data.has_shift === 'あり' && data.health_checkup_schedule === '1年' && !isNaN(nightCount) && nightCount > 4 && !data.health_checkup_schedule_confirmed) {
                    errors.push({ field: 'health_checkup_schedule', msg: `夜勤が月${nightCount}回あります。交代制勤務で夜勤が月4回を超える場合、健康診断は「半年」が推奨されます。問題なければ確認済みにチェックしてください。` });
                }
                const pref = PREFECTURES.find(p => (data.address || '').includes(p));
                if (pref) {
                    const minWage = MIN_WAGE_MASTER[pref];
                    ['1','2','3'].forEach(n => {
                        const hourly = parseFloat(data[`hourly_salary_${n}`]);
                        if (!isNaN(hourly) && hourly > 0 && hourly < minWage) errors.push({ field: `hourly_salary_${n}`, msg: `時給額(実習${n}号) ${hourly}円が${pref}の最低賃金(${MIN_WAGE_YEAR}: ${minWage}円)を下回っています。` });
                    });
                }
                return errors;
            };

            if (!appMode) {
                return (
                    <div className="home-screen">
                        <div style={{ maxWidth: 800, width: '100%', textAlign: 'center' }}>
                            <h1 style={{ fontSize: 48, fontWeight: 900, color: 'white', marginBottom: 8, letterSpacing: '-0.05em', fontStyle: 'italic' }}>CONTRACT MASTER</h1>
                            <p style={{ color: '#64748b', marginBottom: 40, fontSize: 14 }}>雇用契約書作成システム</p>
                            <div className="home-grid">
                                {BUSINESS_UNITS.map(bu => (
                                    <button key={bu.id} className="home-card" onClick={() => setAppMode(bu.id)}>
                                        <div className="icon-box" style={{ background: bu.color }}>{bu.icon}</div>
                                        <h2 style={{ fontSize: 22, fontWeight: 700, color: 'white', marginBottom: 8 }}>{bu.name}</h2>
                                        <p style={{ color: '#64748b', fontSize: 13, marginBottom: 32 }}>{bu.description}</p>
                                        <div style={{ color: '#818cf8', fontWeight: 700, fontSize: 11, letterSpacing: '0.1em', display: 'flex', alignItems: 'center', gap: 6 }}>START CREATION <span>→</span></div>
                                    </button>
                                ))}
                            </div>
                        </div>
                    </div>
                );
            }
            if (appMode === 'skilled' && !subMode) {
                return (
                    <div className="home-screen">
                        <div style={{ maxWidth: 800, width: '100%', textAlign: 'center' }}>
                            <button onClick={() => setAppMode(null)} style={{ color: '#94a3b8', marginBottom: 24, fontSize: 12, fontWeight: 700, letterSpacing: '0.1em', textTransform: 'uppercase' }}>← Back to Main Menu</button>
                            <h1 style={{ fontSize: 36, fontWeight: 900, color: 'white', marginBottom: 8, letterSpacing: '-0.05em' }}>SELECT CATEGORY</h1>
                            <p style={{ color: '#64748b', marginBottom: 40, fontSize: 14 }}>これから行う特定技能の手続きを選択してください</p>
                            <div className="home-grid">
                                <button className="home-card" onClick={() => setSubMode('海外招聘(LV)')}>
                                    <div className="icon-box" style={{ background: '#0891b2' }}>✈️</div>
                                    <h2 style={{ fontSize: 22, fontWeight: 700, color: 'white', marginBottom: 8 }}>海外招聘(LV)</h2>
                                    <p style={{ color: '#64748b', fontSize: 13, marginBottom: 32 }}>海外から新たに人材を呼び寄せる場合(有料職業紹介)</p>
                                    <div style={{ color: '#818cf8', fontWeight: 700, fontSize: 11, letterSpacing: '0.1em', display: 'flex', alignItems: 'center', gap: 6 }}>PROCEED <span>→</span></div>
                                </button>
                                <button className="home-card" onClick={() => setSubMode('特定技能')}>
                                    <div className="icon-box" style={{ background: '#0d9488' }}>🇯🇵</div>
                                    <h2 style={{ fontSize: 22, fontWeight: 700, color: 'white', marginBottom: 8 }}>特定技能(AJS)</h2>
                                    <p style={{ color: '#64748b', fontSize: 13, marginBottom: 32 }}>在留資格認定/変更・無料職業紹介の場合</p>
                                    <div style={{ color: '#818cf8', fontWeight: 700, fontSize: 11, letterSpacing: '0.1em', display: 'flex', alignItems: 'center', gap: 6 }}>PROCEED <span>→</span></div>
                                </button>
                            </div>
                        </div>
                    </div>
                );
            }

            const activeBU = BUSINESS_UNITS.find(b => b.id === appMode);
            const buRecords = dataList.filter(d => d.bu === appMode && (appMode !== 'skilled' || d.sub_type === subMode));
            const currentTabs = GET_TABS(appMode, subMode);
            const activeTabObj = currentTabs.find(t => t.id === currentTab);
            const tabFields = FIELDS.filter(f => {
                const fieldTabId = typeof f.tab === 'function' ? f.tab(currentData || {}) : f.tab;

                // タブ判定（案B：厳格化）
                // - fieldTabId が配列の場合: currentTab を含んでいればマッチ
                // - fieldTabId が数値の場合: currentTab と完全一致ならマッチ
                // ※ 旧ロジックの ref 経由フォールバックは廃止（FIELDSで tab: [1,11] のように明示指定する方針）
                const isTabMatch = Array.isArray(fieldTabId)
                    ? fieldTabId.includes(currentTab)
                    : fieldTabId === currentTab;

                return isTabMatch && f.bu?.includes(appMode);
            });
            const validationErrors = validate(currentData);
            const errorFieldIds = new Set(validationErrors.map(e => e.field));

            // ─── LVモード: STEP1の完了状態を判定 ──────────────────────────────────
            // STEP1に属するタブ（1, 5, 3, 4）のフィールドにエラーがあればSTEP1未完了
            // ※ LV以外のモードでは使用されない
            const isLV = (appMode === 'skilled' && subMode === '海外招聘(LV)');
            const STEP1_TABS = [1, 5, 3, 4];
            const step1Errors = isLV ? validationErrors.filter(err => {
                const field = FIELDS.find(f => f.id === err.field);
                if (!field) return false;
                const fieldTab = typeof field.tab === 'function' ? field.tab(currentData || {}) : field.tab;
                const tabList = Array.isArray(fieldTab) ? fieldTab : [fieldTab];
                return STEP1_TABS.some(t => tabList.includes(t));
            }) : [];
            const isStep1Complete = isLV && step1Errors.length === 0;
            const isAllComplete = validationErrors.length === 0;

            // エラー項目クリック時のジャンプ処理
            // 1. 該当フィールドのタブを特定（配列なら最初の要素）
            // 2. 現在のタブと違えば切替
            // 3. スムーズスクロール + フォーカス
            const jumpToErrorField = (fieldId) => {
                const field = FIELDS.find(f => f.id === fieldId);
                if (!field) return;
                const fieldTab = typeof field.tab === 'function' ? field.tab(currentData || {}) : field.tab;
                const targetTab = Array.isArray(fieldTab) ? fieldTab[0] : fieldTab;
                if (targetTab !== currentTab) {
                    setCurrentTab(targetTab);
                }
                // タブ切替後のレンダリングを待ってからスクロール
                setTimeout(() => {
                    const el = document.getElementById(`field-${fieldId}`);
                    if (el) {
                        el.scrollIntoView({ behavior: 'smooth', block: 'center' });
                        // 入力要素にフォーカス
                        const input = el.querySelector('input, select, textarea');
                        if (input) input.focus({ preventScroll: true });
                    }
                }, 50);
            };

            return (
                <div style={{ display: 'flex', height: '100vh', background: 'white' }}>
                    {notification && <Notification message={notification.msg} type={notification.type} onClose={() => setNotification(null)} />}

                    {/* CSV種別選択モーダル */}
                    {csvImportType === '__select__' && (
                        <div style={{ position: 'fixed', inset: 0, background: 'rgba(15, 23, 42, 0.6)', display: 'flex', alignItems: 'center', justifyContent: 'center', zIndex: 1000 }}
                             onClick={() => setCsvImportType(null)}>
                            <div style={{ background: 'white', borderRadius: 16, padding: 32, maxWidth: 480, width: '90%', boxShadow: '0 20px 25px -5px rgba(0,0,0,0.1)' }}
                                 onClick={e => e.stopPropagation()}>
                                <h2 style={{ fontSize: 18, fontWeight: 900, marginBottom: 8 }}>CSVの読み込み</h2>
                                <p style={{ fontSize: 13, color: '#64748b', marginBottom: 24 }}>読み込むCSVの種類を選択してください</p>
                                <div style={{ display: 'flex', flexDirection: 'column', gap: 12 }}>
                                    <button onClick={() => { setCsvImportType('save'); setTimeout(() => fileInputRef.current?.click(), 50); }}
                                            style={{ padding: '16px 20px', border: '1px solid #e2e8f0', borderRadius: 12, textAlign: 'left', background: 'white', cursor: 'pointer' }}>
                                        <div style={{ fontWeight: 900, fontSize: 14, marginBottom: 4 }}>一時保存CSV</div>
                                        <div style={{ fontSize: 12, color: '#64748b' }}>ツールから出力した一時保存データ</div>
                                    </button>
                                    <button onClick={() => { setCsvImportType('past_data'); setTimeout(() => fileInputRef.current?.click(), 50); }}
                                            style={{ padding: '16px 20px', border: '1px solid #e2e8f0', borderRadius: 12, textAlign: 'left', background: 'white', cursor: 'pointer' }}>
                                        <div style={{ fontWeight: 900, fontSize: 14, marginBottom: 4 }}>過去データCSV</div>
                                        <div style={{ fontSize: 12, color: '#64748b' }}>Salesforceから取得した取引先＋ジョブ等のマージデータ</div>
                                    </button>
                                </div>
                                <div style={{ marginTop: 20, textAlign: 'right' }}>
                                    <button onClick={() => setCsvImportType(null)}
                                            style={{ padding: '8px 16px', background: 'transparent', border: 'none', color: '#64748b', fontSize: 13, fontWeight: 700, cursor: 'pointer' }}>
                                        キャンセル
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    <div className="sidebar">
                        <div style={{ padding: 24 }}>
                            <button onClick={() => {
                                // 特定技能の場合は1つ前のサブメニュー画面に戻る
                                if (appMode === 'skilled') {
                                    setSubMode(null);
                                } else {
                                    setAppMode(null);
                                }
                                setCurrentId(null);
                            }} style={{ fontSize: 11, fontWeight: 900, color: '#94a3b8', letterSpacing: '0.1em', textTransform: 'uppercase', display: 'flex', alignItems: 'center', gap: 4, marginBottom: 24 }}>← Back</button>
                            <div style={{ display: 'flex', alignItems: 'center', gap: 12, marginBottom: 24 }}>
                                <div className="icon-box-sm" style={{ background: activeBU.color, color: 'white' }}>{activeBU.icon}</div>
                                <h1 style={{ fontSize: 16, fontWeight: 900, letterSpacing: '-0.03em' }}>{activeBU.name} {subMode ? `- ${subMode}` : ''}</h1>
                            </div>
                            {/* ─── 【変更③】LOADボタンを実際のインポート処理に接続 ─── */}
                            <div className="grid-2">
                                <button onClick={createNew} style={{ background: '#4f46e5', color: 'white', fontWeight: 900, padding: '12px 8px', borderRadius: 12, fontSize: 11, display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 4 }}>
                                    <span style={{ fontSize: 20 }}>＋</span> NEW
                                </button>
                                <button onClick={() => setCsvImportType('__select__')} style={{ background: 'white', border: '1px solid #e2e8f0', color: '#475569', fontWeight: 900, padding: '12px 8px', borderRadius: 12, fontSize: 11, display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 4 }}>
                                    <span style={{ fontSize: 20 }}>↑</span> LOAD
                                </button>
                                {/* CSV種別選択モーダルでユーザーが選択後にファイル選択を起動 */}
                                <input type="file" ref={fileInputRef} style={{ display: 'none' }} accept=".csv" onChange={importCSV} />
                            </div>
                        </div>

                        <div style={{ flex: 1, overflowY: 'auto', padding: '0 16px 16px' }}>
                            <div style={{ fontSize: 10, fontWeight: 900, color: '#cbd5e1', letterSpacing: '0.1em', textTransform: 'uppercase', marginBottom: 8, paddingLeft: 8 }}>Records ({buRecords.length})</div>
                            {buRecords.map(item => {
                                const errors = validate(item);
                                return (
                                    <div key={item.id} className={`record-item ${currentId === item.id ? 'active' : ''}`}>
                                        <div onClick={() => setCurrentId(item.id)}>
                                            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 2 }}>
                                                <span style={{ fontWeight: 700, fontSize: 12, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap', paddingRight: 8 }}>{item.company_name || '(未入力)'}</span>
                                                <div className={`dot ${errors.length > 0 ? 'dot-red' : 'dot-green'}`} />
                                            </div>
                                            <div style={{ fontSize: 10, fontFamily: 'monospace', color: '#94a3b8' }}>{item.id}</div>
                                        </div>
                                        <button className="delete-btn" onClick={(e) => { e.stopPropagation(); deleteRecord(item.id); }}>🗑️ 削除</button>
                                    </div>
                                );
                            })}
                        </div>

                        <div style={{ padding: 20, background: 'white', borderTop: '1px solid #e2e8f0' }}>
                            {/* エラーの有無・STEP1/STEP2完了状況でボタンの色とテキストを切り替え */}
                            {(() => {
                                // ボタン無効化: レコードなし
                                const isDisabled = buRecords.length === 0;
                                
                                // ボタンのスタイル・文言を決定
                                let btnStyle = {};
                                let btnLabel = '💾 Export CSV';
                                
                                if (!isDisabled) {
                                    if (isLV) {
                                        // LVモード: STEP1/STEP2の完了状態で4段階分岐
                                        if (!isStep1Complete) {
                                            // STEP1未完了 → 一時保存のみ（オレンジ）
                                            btnStyle = { background: '#f59e0b', color: 'white' };
                                            btnLabel = '💾 一時保存のみ（STEP1未完了）';
                                        } else if (!isAllComplete) {
                                            // STEP1完了・STEP2未完了 → 受入要望書出力可（青系）
                                            btnStyle = { background: '#0ea5e9', color: 'white' };
                                            btnLabel = '🚀 受入要望書出力可（3ファイル）';
                                        } else {
                                            // 全完了 → 雇用条件書出力可（緑）
                                            btnStyle = { background: '#10b981', color: 'white' };
                                            btnLabel = '🚀 雇用条件書出力可（3ファイル）';
                                        }
                                    } else {
                                        // 技能実習・特定技能AJS: 既存ロジック維持
                                        if (validationErrors.length > 0) {
                                            btnStyle = { background: '#f59e0b', color: 'white' };
                                            btnLabel = '💾 一時保存のみ（エラーあり）';
                                        } else {
                                            btnStyle = { background: '#10b981', color: 'white' };
                                            btnLabel = '🚀 Salesforce用出力（3ファイル）';
                                        }
                                    }
                                }
                                
                                return (
                                    <button 
                                        className="btn-export" 
                                        disabled={isDisabled} 
                                        onClick={() => {
                                            // exportCSV の hasError 引数：
                                            // - LVモード: STEP1未完了なら true（一時保存のみ）、STEP1完了なら false（3ファイル）
                                            // - それ以外: validationErrors があれば true
                                            const hasErrorForExport = isLV ? !isStep1Complete : (validationErrors.length > 0);
                                            exportCSV(hasErrorForExport);
                                        }}
                                        style={btnStyle}
                                    >
                                        {btnLabel}
                                    </button>
                                );
                            })()}
                        </div>
                    </div>

                    <div ref={mainScrollRef} style={{ flex: 1, overflowY: 'auto', display: 'flex', flexDirection: 'column' }}>
                        {currentData ? (
                            <>
                                <div style={{ padding: '24px 32px', borderBottom: '1px solid #e2e8f0', position: 'sticky', top: 0, background: 'white', zIndex: 10, boxShadow: '0 1px 3px rgba(0,0,0,.08)' }}>
                                    <h2 style={{ fontSize: 28, fontWeight: 900, letterSpacing: '-0.04em', margin: '0 0 16px 0' }}>{currentData.company_name || 'New Item'}</h2>
                                    
                                    <div style={{ display: 'flex', flexDirection: 'column', gap: '12px' }}>
                                        {subMode === '海外招聘(LV)' ? (
                                            <>
                                                {/* STEP 1: 要望書グループ */}
                                                <div style={{ display: 'flex', alignItems: 'center', gap: '12px' }}>
                                                    <span style={{ fontSize: '10px', fontWeight: '900', color: '#0891b2', background: 'rgba(8,145,178,0.1)', padding: '2px 8px', borderRadius: '4px', letterSpacing: '0.05em', whiteSpace: 'nowrap' }}>STEP 1: 受入要望書</span>
                                                    <div className="tab-nav" style={{ flex: 1 }}>
                                                        {currentTabs.filter(t => t.group === '受入要望書').map(tab => (
                                                            <button key={tab.id} className={`tab-btn ${currentTab === tab.id ? 'active' : ''}`} 
                                                                    onClick={() => { setCurrentTab(tab.id); if (mainScrollRef.current) mainScrollRef.current.scrollTop = 0; }}
                                                                    style={currentTab === tab.id ? { background: tab.color, color: 'white' } : {}}>
                                                                <span style={{ marginRight: 6 }}>{tab.icon}</span> {tab.name}
                                                            </button>
                                                        ))}
                                                    </div>
                                                </div>
                                                {/* STEP 2: 条件書グループ */}
                                                <div style={{ display: 'flex', alignItems: 'center', gap: '12px' }}>
                                                    <span style={{ fontSize: '10px', fontWeight: '900', color: '#4f46e5', background: 'rgba(79,70,229,0.1)', padding: '2px 8px', borderRadius: '4px', letterSpacing: '0.05em', whiteSpace: 'nowrap' }}>STEP 2: 雇用条件書</span>
                                                    <div className="tab-nav" style={{ flex: 1 }}>
                                                        {currentTabs.filter(t => t.group === '雇用条件書').map(tab => (
                                                            <button key={tab.id} className={`tab-btn ${currentTab === tab.id ? 'active' : ''}`} 
                                                                    onClick={() => { setCurrentTab(tab.id); if (mainScrollRef.current) mainScrollRef.current.scrollTop = 0; }}
                                                                    style={currentTab === tab.id ? { background: tab.color, color: 'white' } : {}}>
                                                                <span style={{ marginRight: 6 }}>{tab.icon}</span> {tab.name}
                                                            </button>
                                                        ))}
                                                    </div>
