                                    buRecords.length === 0 ? {} :
                                    validationErrors.length > 0 
                                        ? { background: '#f59e0b', color: 'white' } // エラーあり：オレンジ系
                                        : { background: '#10b981', color: 'white' } // エラーなし：グリーン系
                                }
                            >
                                {buRecords.length === 0 ? '💾 Export CSV' :
                                 validationErrors.length > 0 ? '💾 一時保存のみ（エラーあり）' : '🚀 Salesforce用出力（3ファイル）'}
                            </button>
                        </div>
                    </div>

                    <div ref={mainScrollRef} style={{ flex: 1, overflowY: 'auto', display: 'flex', flexDirection: 'column' }}>
                        {currentData ? (
                            <>
                                <div style={{ padding: '24px 32px', borderBottom: '1px solid #e2e8f0', position: 'sticky', top: 0, background: 'white', zIndex: 10, boxShadow: '0 1px 3px rgba(0,0,0,.08)' }}>
                                    <h2 style={{ fontSize: 28, fontWeight: 900, letterSpacing: '-0.04em', margin: '0 0 16px 0' }}>{currentData.company_name || 'New Item'}</h2>
                                    <div className="tab-nav">
                                        {TABS.map(tab => (
                                            <button key={tab.id} className={`tab-btn ${currentTab === tab.id ? 'active' : ''}`} onClick={() => { setCurrentTab(tab.id); if (mainScrollRef.current) mainScrollRef.current.scrollTop = 0; }}>
                                                <span style={{ marginRight: 6 }}>{tab.icon}</span> {tab.name}
                                            </button>
                                        ))}
                                    </div>
                                </div>

                                {currentTab === 6 ? (
                                    <div style={{ padding: 48, maxWidth: 1200, margin: '0 auto', width: '100%', flex: 1, display: 'flex', flexDirection: 'column' }}>
                                        <div style={{ flex: 1, display: 'flex', flexDirection: 'column', background: 'white', borderRadius: 20, border: '1px solid #e2e8f0', overflow: 'hidden', boxShadow: '0 4px 24px rgba(0,0,0,0.06)' }}>
                                            <div style={{ padding: '20px 28px', borderBottom: '1px solid #f1f5f9', display: 'flex', alignItems: 'center', justifyContent: 'space-between', background: 'linear-gradient(135deg, #0f172a 0%, #1e293b 100%)' }}>
                                                <div style={{ display: 'flex', alignItems: 'center', gap: 12 }}>
                                                    <span style={{ fontSize: 20 }}>📝</span>
                                                    <span style={{ color: 'white', fontWeight: 900, fontSize: 14, letterSpacing: '0.08em', textTransform: 'uppercase' }}>MEMO</span>
                                                    <span style={{ color: '#475569', fontSize: 11 }}>— {currentData.company_name || '(未入力)'}</span>
                                                </div>
                                                <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
                                                    <span style={{ fontSize: 10, fontFamily: 'monospace', color: '#64748b', background: '#0f172a', padding: '4px 10px', borderRadius: 20, border: '1px solid #334155' }}>
                                                        {(currentData._memo || '').length} chars
                                                    </span>
                                                    <button onClick={() => { if (confirm('メモをクリアしますか？')) updateMemo(''); }}
                                                        style={{ fontSize: 10, fontWeight: 900, color: '#64748b', padding: '4px 12px', borderRadius: 20, letterSpacing: '0.08em', border: '1px solid #334155', background: 'transparent', textTransform: 'uppercase' }}
                                                        onMouseEnter={e => { e.target.style.color='#ef4444'; e.target.style.borderColor='#ef4444'; }}
                                                        onMouseLeave={e => { e.target.style.color='#64748b'; e.target.style.borderColor='#334155'; }}>
                                                        Clear
                                                    </button>
                                                </div>
                                            </div>
                                            <textarea value={currentData._memo || ''} onChange={e => updateMemo(e.target.value)}
                                                placeholder={`ここに自由にメモを記入してください。\n\n例:\n・企業様との打ち合わせ内容\n・確認が必要な事項\n・特記事項など`}
                                                style={{ flex: 1, width: '100%', minHeight: 'calc(100vh - 340px)', border: 'none', outline: 'none', resize: 'none', padding: '28px 32px', fontFamily: "'Noto Sans JP', 'Inter', sans-serif", fontSize: 14, lineHeight: 1.9, color: '#1e293b', background: '#fafbfc', letterSpacing: '0.02em' }}
                                            />
                                            <div style={{ padding: '12px 28px', borderTop: '1px solid #f1f5f9', display: 'flex', alignItems: 'center', justifyContent: 'space-between', background: 'white' }}>
                                                <span style={{ fontSize: 10, color: '#cbd5e1', fontWeight: 700, letterSpacing: '0.1em', textTransform: 'uppercase' }}>💡 このメモはCSV出力に含まれます（_memoカラム）</span>
                                                <span style={{ fontSize: 10, color: '#cbd5e1', fontFamily: 'monospace' }}>{new Date().toLocaleDateString('ja-JP')}</span>
                                            </div>
                                        </div>
                                    </div>
                                ) : (
                                    <div style={{ padding: 48, maxWidth: 1200, margin: '0 auto', width: '100%' }}>
                                        <div className="grid-form">
                                            <div className="field-grid">
                                                <div className="field-section anim-fade">
                                                    <div className="field-section-title">{TABS.find(t => t.id === currentTab)?.icon} {TABS.find(t => t.id === currentTab)?.name}</div>
                                                    {(() => {
                                                        const rendered = [];
                                                        let i = 0;
                                                        while (i < tabFields.length) {
                                                            const f = tabFields[i];
                                                            const next = tabFields[i + 1];
                                                            if (f.showIf && !f.showIf(currentData)) { i++; continue; }
                                                            if (f.type === 'section') {
                                                                rendered.push(
                                                                    <div key={f.label} style={{ background: '#fef3c7', padding: '10px 16px', borderRadius: '8px', marginBottom: '20px', marginTop: '20px', fontSize: '12px', fontWeight: '900', color: '#92400e', borderLeft: '4px solid #f59e0b', display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
                                                                        <span>{f.label}</span>
                                                                        {f.help && <span style={{ fontWeight: 400, fontSize: 11, color: '#b45309' }}>{f.help}</span>}
                                                                    </div>
                                                                );
                                                                i++; continue;
                                                            }
                                                            if (f.tripled) {
                                                                const group = [f]; let j = i + 1;
                                                                while (j < tabFields.length && tabFields[j].tripled && group.length < 3) { group.push(tabFields[j]); j++; }
                                                                rendered.push(
                                                                    <div key={group.map(g => g.id).join('+')} style={{ display: 'grid', gridTemplateColumns: '1fr 1fr 1fr', gap: '16px', marginBottom: 24 }}>
                                                                        {group.map(field => (
                                                                            <div key={field.id} className="anim-fade">
                                                                                <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 6 }}>
                                                                                    <label style={{ fontSize: 10, fontWeight: 900, textTransform: 'uppercase', letterSpacing: '0.1em', color: '#64748b' }}>{field.label} {field.req && <span style={{ color: '#ef4444' }}>*</span>}</label>
                                                                                    <span style={{ fontSize: 9, fontFamily: 'monospace', color: '#cbd5e1', fontStyle: 'italic' }}>{field.sf}</span>
                                                                                </div>
                                                                                <select className={`field-input ${errorFieldIds.has(field.id) ? 'has-error' : ''}`} value={currentData[field.id] || ''} onChange={e => updateField(field.id, e.target.value)}>
                                                                                    <option value="">未選択</option>
                                                                                    {(typeof field.opts === 'function' ? field.opts(currentData) : (field.opts || [])).map(o => <option key={o} value={o}>{o}</option>)}
                                                                                </select>
                                                                                {field.help && <div className="field-help">💡 {field.help}</div>}
                                                                            </div>
                                                                        ))}
                                                                    </div>
                                                                );
                                                                i = j; continue;
                                                            }
                                                            if (f.paired && next && next.paired && next.type !== 'section' && !(next.showIf && !next.showIf(currentData))) {
                                                                rendered.push(
                                                                    <div key={f.id + next.id + '_wrapper'} style={{ marginBottom: 24 }}>
                                                                        <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '16px' }}>
                                                                            {[f, next].map(field => {
                                                                                const isReadOnly = typeof field.readOnly === 'function' ? field.readOnly(currentData) : (field.readOnly || field.id === 'area_per_person');
                                                                                return (
                                                                                    <div key={field.id} className="anim-fade">
                                                                                        <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 6 }}>
                                                                                            <label style={{ fontSize: 10, fontWeight: 900, textTransform: 'uppercase', letterSpacing: '0.1em', color: '#64748b' }}>{field.label} {field.req && <span style={{ color: '#ef4444' }}>*</span>}</label>
                                                                                            <span style={{ fontSize: 9, fontFamily: 'monospace', color: '#cbd5e1', fontStyle: 'italic' }}>{field.sf}</span>
                                                                                        </div>
                                                                                        <div className="relative">
                                                                                            {field.type === 'select' ? (
                                                                                                <select className={`field-input ${errorFieldIds.has(field.id) ? 'has-error' : ''}`} value={currentData[field.id] || ''} onChange={e => updateField(field.id, e.target.value)}>
                                                                                                    <option value="">未選択</option>
                                                                                                    {(typeof field.opts === 'function' ? field.opts(currentData) : (field.opts || [])).map(o => <option key={o} value={o}>{o}</option>)}
                                                                                                </select>
                                                                                            ) : (
                                                                                                <input 
                                                                                                    className={`field-input ${errorFieldIds.has(field.id) ? 'has-error' : ''}`} 
                                                                                                    type={field.type} 
                                                                                                    value={currentData[field.id] || ''} 
                                                                                                    onChange={e => updateField(field.id, e.target.value)} 
                                                                                                    readOnly={isReadOnly} 
                                                                                                    style={isReadOnly ? { background: '#fef9c3', cursor: 'not-allowed', color: '#854d0e', borderColor: '#fde047' } : {}}
                                                                                                    onKeyDown={(e) => {
                                                                                                        if (field.type === 'number' && (e.key === 'ArrowUp' || e.key === 'ArrowDown')) {
                                                                                                            e.preventDefault();
                                                                                                        }
                                                                                                    }}
                                                                                                    onWheel={(e) => {
                                                                                                        if (field.type === 'number') e.target.blur();
                                                                                                    }}
                                                                                                />
                                                                                            )}
                                                                                            {field.suf && <span className="suffix">{field.suf}</span>}
                                                                                        </div>
                                                                                        {(() => {
                                                                                            const helpVal = typeof field.help === 'function' ? field.help(currentData) : field.help;
                                                                                            if (!helpVal) return null;
                                                                                            if (typeof helpVal === 'object' && helpVal.wageInfo !== undefined) {
                                                                                                return (<div>{helpVal.wageInfo && (<div style={{ fontSize: 11, fontWeight: 700, marginTop: 6, marginBottom: 4, padding: '8px 12px', borderRadius: 8, background: helpVal.wageInfo.ok ? 'rgba(16,185,129,0.1)' : 'rgba(239,68,68,0.1)', color: helpVal.wageInfo.ok ? '#059669' : '#dc2626', borderLeft: `3px solid ${helpVal.wageInfo.ok ? '#10b981' : '#ef4444'}` }}>{helpVal.wageInfo.ok ? '✅' : '❌'} {helpVal.wageInfo.msg}<br/><span style={{ fontWeight: 400, fontSize: 10 }}>※賃金は{MIN_WAGE_YEAR}時点の数値を参照しています</span></div>)}<div className="field-help">💡 {helpVal.baseMsg}</div></div>);
                                                                                            }
                                                                                            return <div className="field-help">💡 {helpVal}</div>;
                                                                                        })()}
                                                                                    </div>
                                                                                );
                                                                            })}
                                                                        </div>
                                                                        {/* 👇👇👇 年所定労働時間の場合のみ、下にシミュレーターと適用ボタンを表示する 👇👇👇 */}
                                                                        {f.id === 'annual_work_hours' && currentData.has_shift === 'なし' && (() => {
                                                                            const ah = parseInt(currentData.annual_holidays);
                                                                            const dwh = parseInt(currentData.daily_work_hours) || 0;
                                                                            const dwm = parseInt(currentData.daily_work_minutes) || 0;
                                                                            
                                                                            if (isNaN(ah) || (dwh === 0 && dwm === 0)) {
                                                                                return (
                                                                                    <div className="anim-fade" style={{ marginTop: 12, padding: '16px 20px', background: '#f8fafc', borderRadius: 12, border: '1px dashed #cbd5e1', fontSize: 12, color: '#64748b', textAlign: 'center', lineHeight: 1.6 }}>
                                                                                        <span style={{ fontSize: 16, display: 'block', marginBottom: 4 }}>💡</span>
                                                                                        すぐ下の <strong>年間合計休日数</strong> と、基本労働時間の <strong>1日の所定労働時間</strong> が入力されると、<br/>ここに年所定労働時間の計算シミュレーターが表示されます。
                                                                                    </div>
                                                                                );
                                                                            }

                                                                            let satMin = 0;
                                                                            if (currentData.saturday_work === 'あり' && currentData.other_start_time && currentData.other_end_time) {
                                                                                const t2m = (t) => { if(!t) return 0; const [h,m] = t.split(':').map(Number); return h * 60 + m; };
                                                                                const s = t2m(currentData.other_start_time);
                                                                                const e = t2m(currentData.other_end_time);
                                                                                const b = parseInt(currentData.other_break_total_minutes) || 0;
                                                                                if (e > s) satMin = Math.max(0, e - s - b);
                                                                            }

                                                                            const totalWorkDays = 365 - ah;
                                                                            let weekdayDays = 0;
                                                                            let satDays = 0;

                                                                            if (currentData.saturday_work === 'あり') {
                                                                                if (totalWorkDays > 260) {
                                                                                    weekdayDays = 260;
                                                                                    satDays = totalWorkDays - 260;
                                                                                } else {
                                                                                    weekdayDays = totalWorkDays;
                                                                                    satDays = 0;
                                                                                }
                                                                            } else {
                                                                                weekdayDays = totalWorkDays;
                                                                                satDays = 0;
                                                                            }

                                                                            const canCalculate = currentData.saturday_work === 'なし' || (currentData.saturday_work === 'あり' && satMin > 0);
                                                                            if (!canCalculate) return null;

                                                                            const weekdayMinTotal = weekdayDays * (dwh * 60 + dwm);
                                                                            const satMinTotal = satDays * satMin;
                                                                            const calcTotalMin = weekdayMinTotal + satMinTotal;
                                                                            const calcH = Math.floor(calcTotalMin / 60);
                                                                            const calcM = calcTotalMin % 60;

                                                                            return (
                                                                                <div className="anim-fade" style={{ marginTop: 12, padding: '16px 20px', background: '#f8fafc', borderRadius: 12, border: '1px solid #cbd5e1', fontSize: 12, color: '#334155' }}>
                                                                                    <div style={{ fontWeight: 900, marginBottom: 12, color: '#4f46e5', display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
                                                                                        <span>💡 年所定労働時間の計算シミュレーター</span>
                                                                                        <button 
                                                                                            onClick={(e) => {
                                                                                                e.preventDefault();
                                                                                                updateField('annual_work_hours', String(calcH));
                                                                                                updateField('annual_work_minutes', String(calcM));
                                                                                            }}
                                                                                            style={{ background: '#4f46e5', color: 'white', padding: '6px 16px', borderRadius: 8, fontWeight: 900, fontSize: 11, cursor: 'pointer', transition: 'all 0.2s', boxShadow: '0 2px 4px rgba(79, 70, 229, 0.2)' }}
                                                                                            onMouseEnter={e => { e.target.style.background = '#4338ca'; e.target.style.transform = 'translateY(-1px)'; }}
                                                                                            onMouseLeave={e => { e.target.style.background = '#4f46e5'; e.target.style.transform = 'translateY(0)'; }}
                                                                                        >
                                                                                            👈 この推奨値を適用する
                                                                                        </button>
                                                                                    </div>
                                                                                    <div style={{ display: 'grid', gridTemplateColumns: '1fr', gap: 6, fontFamily: 'monospace', fontSize: 13 }}>
                                                                                        <div>・総出勤日数: <span style={{fontWeight:700}}>{totalWorkDays}日</span> (365日 - 休日{ah}日)</div>
                                                                                        <div>・平日分: {weekdayDays}日 × {dwh}時間{dwm > 0 ? `${dwm}分` : ''} = <span style={{fontWeight:700}}>{Math.floor(weekdayMinTotal/60)}時間{weekdayMinTotal%60 > 0 ? `${weekdayMinTotal%60}分` : ''}</span></div>
                                                                                        {satDays > 0 && (
                                                                                            <div>・土曜分: {satDays}日 × {Math.floor(satMin/60)}時間{satMin%60 > 0 ? `${satMin%60}分` : ''} = <span style={{fontWeight:700}}>{Math.floor(satMinTotal/60)}時間{satMinTotal%60 > 0 ? `${satMinTotal%60}分` : ''}</span></div>
                                                                                        )}
                                                                                        <div style={{ marginTop: 8, paddingTop: 8, borderTop: '1px dashed #cbd5e1', fontWeight: 900, fontSize: 15, color: '#0f172a' }}>
                                                                                            合計: <span style={{color: '#e63946'}}>{calcH}時間 {calcM > 0 ? `${calcM}分` : ''}</span>
                                                                                        </div>
                                                                                    </div>
                                                                                </div>
                                                                            );
                                                                        })()}
                                                                    </div>
                                                                );
                                                                i += 2; continue;
                                                            }
                                                            const isReadOnly = typeof f.readOnly === 'function' ? f.readOnly(currentData) : (f.readOnly || f.id === 'area_per_person');
                                                            if (f.id === 'hourly_salary_1' && currentData.payment_type === '月給' && currentData.residence_status === '実習1号') {
                                                                const pref = PREFECTURES.find(p => (currentData.address || '').includes(p));
                                                                const minWage = pref ? MIN_WAGE_MASTER[pref] : null;
                                                                const annMin = (parseInt(currentData.annual_work_hours) || 0) * 60 + (parseInt(currentData.annual_work_minutes) || 0);
                                                                
                                                                if (!pref || !minWage || annMin === 0) {
                                                                    rendered.push(
                                                                        <div key="min_wage_sim_placeholder" className="anim-fade" style={{ marginBottom: 24, padding: '16px 20px', background: '#f8fafc', borderRadius: 12, border: '1px dashed #cbd5e1', fontSize: 12, color: '#64748b', textAlign: 'center', lineHeight: 1.6 }}>
                                                                            <span style={{ fontSize: 16, display: 'block', marginBottom: 4 }}>💡</span>
                                                                            基本情報の <strong>所在地(拠点)</strong> と <strong>年所定労働時間</strong> が入力されると、<br/>ここに最低賃金からの月給計算シミュレーターが表示されます。
                                                                        </div>
                                                                    );
                                                                } else {
                                                                    const annHours = annMin / 60;
                                                                    // 月給 = (最低賃金 × 年間労働時間) / 12 (※最低賃金を割らないよう1円未満は切り上げ)
                                                                    const calcMonthly = Math.ceil((minWage * annHours) / 12);
                                                                    
                                                                    rendered.push(
                                                                        <div key="min_wage_sim" className="anim-fade" style={{ marginBottom: 24, padding: '16px 20px', background: '#f8fafc', borderRadius: 12, border: '1px solid #cbd5e1', fontSize: 12, color: '#334155' }}>
                                                                            <div style={{ fontWeight: 900, marginBottom: 12, color: '#059669', display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
                                                                                <span>💡 最低賃金からの月給計算シミュレーター</span>
                                                                                <button 
                                                                                    onClick={(e) => {
                                                                                        e.preventDefault();
                                                                                        updateField('monthly_salary_1', String(calcMonthly));
                                                                                    }}
                                                                                    style={{ background: '#059669', color: 'white', padding: '6px 16px', borderRadius: 8, fontWeight: 900, fontSize: 11, cursor: 'pointer', transition: 'all 0.2s', boxShadow: '0 2px 4px rgba(5, 150, 105, 0.2)' }}
                                                                                    onMouseEnter={e => { e.target.style.background = '#047857'; e.target.style.transform = 'translateY(-1px)'; }}
                                                                                    onMouseLeave={e => { e.target.style.background = '#059669'; e.target.style.transform = 'translateY(0)'; }}
                                                                                >
                                                                                    👈 月給額(実習1号)に適用する
                                                                                </button>
                                                                            </div>
                                                                            <div style={{ display: 'grid', gridTemplateColumns: '1fr', gap: 6, fontFamily: 'monospace', fontSize: 13 }}>
                                                                                <div>・適用地域: <span style={{fontWeight:700}}>{pref}</span> ({MIN_WAGE_YEAR}最低賃金: <span style={{fontWeight:700}}>{minWage}円</span>)</div>
                                                                                <div>・年所定労働時間: <span style={{fontWeight:700}}>{parseFloat(annHours.toFixed(2))}時間</span></div>
                                                                                <div>・計算式: {minWage}円 × {parseFloat(annHours.toFixed(2))}時間 ÷ 12ヶ月</div>
                                                                                <div style={{ marginTop: 8, paddingTop: 8, borderTop: '1px dashed #cbd5e1', fontWeight: 900, fontSize: 15, color: '#0f172a' }}>
                                                                                    推奨月給額: <span style={{color: '#e63946'}}>{calcMonthly.toLocaleString()} 円</span> <span style={{fontSize: 10, color: '#64748b', fontWeight: 400}}>(※1円未満切り上げ)</span>
                                                                                </div>
                                                                            </div>
                                                                        </div>
                                                                    );
                                                                }
                                                            }
                                                            rendered.push(
                                                                <div key={f.id} style={{ marginBottom: 24 }} className="anim-fade">
                                                                    <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 6 }}>
                                                                        <label style={{ fontSize: 10, fontWeight: 900, textTransform: 'uppercase', letterSpacing: '0.1em', color: '#64748b' }}>{f.label} {f.req && <span style={{ color: '#ef4444' }}>*</span>}</label>
                                                                        <span style={{ fontSize: 9, fontFamily: 'monospace', color: '#cbd5e1', fontStyle: 'italic' }}>{f.sf}</span>
                                                                    </div>
                                                                    {f.prompt && <div className="field-prompt">{f.prompt}</div>}
                                                                    {f.type === 'multiselect' ? (
                                                                        <div style={{ display: 'flex', flexWrap: 'wrap', gap: '8px', padding: '12px', background: '#f8fafc', borderRadius: '12px' }}>
                                                                            {f.opts.map(opt => {
                                                                                const isChecked = Array.isArray(currentData[f.id]) && currentData[f.id].includes(opt);
                                                                                return (
                                                                                    <label key={opt} style={{ display: 'flex', alignItems: 'center', gap: '6px', padding: '6px 12px', borderRadius: '20px', background: isChecked ? '#4f46e5' : 'white', color: isChecked ? 'white' : '#475569', border: '1px solid #e2e8f0', cursor: 'pointer', fontSize: '12px', fontWeight: '700', transition: 'all 0.2s' }}>
                                                                                        <input type="checkbox" style={{ display: 'none' }} checked={isChecked} onChange={() => { const cur = Array.isArray(currentData[f.id]) ? currentData[f.id] : []; updateField(f.id, isChecked ? cur.filter(v => v !== opt) : [...cur, opt]); }} />
                                                                                        {opt}
                                                                                    </label>
                                                                                );
                                                                            })}
                                                                        </div>
                                                                    ) : f.type === 'checkbox_confirm' ? (
                                                                        <label style={{ display: 'flex', alignItems: 'center', gap: 10, padding: '12px 16px', borderRadius: 12, background: currentData[f.id] ? 'rgba(16,185,129,0.08)' : 'rgba(239,68,68,0.07)', border: `1.5px solid ${currentData[f.id] ? '#10b981' : '#fca5a5'}`, cursor: 'pointer', fontWeight: 700, fontSize: 13, color: currentData[f.id] ? '#059669' : '#dc2626', transition: 'all 0.2s' }}>
                                                                            <input type="checkbox" checked={!!currentData[f.id]} onChange={e => updateField(f.id, e.target.checked)} style={{ width: 18, height: 18, accentColor: '#10b981', cursor: 'pointer' }} />
                                                                            {currentData[f.id] ? '✅ 確認済み（アラート解除）' : '⚠️ 確認してチェックを入れてください'}
                                                                        </label>
                                                                    ) : f.type === 'select' ? (
                                                                        <select className={`field-input ${errorFieldIds.has(f.id) ? 'has-error' : ''}`} value={currentData[f.id] || ''} onChange={e => updateField(f.id, e.target.value)}>
                                                                            <option value="">未選択</option>
                                                                            {(typeof f.opts === 'function' ? f.opts(currentData) : (f.opts || [])).map(o => <option key={o} value={o}>{o}</option>)}
                                                                        </select>
                                                                    ) : f.type === 'searchable' ? (
                                                                        <div className="relative">
                                                                            <input 
                                                                                className={`field-input ${errorFieldIds.has(f.id) ? 'has-error' : ''}`} 
                                                                                type="text" list={`${f.id}-list`} 
                                                                                value={currentData[f.id] || ''} 
                                                                                onChange={e => updateField(f.id, e.target.value)} />
                                                                            <datalist id={`${f.id}-list`}>{(f.id === 'work_name' ? (JOB_WORK_MAP[currentData.job_type] || []) : (f.opts || [])).map(o => <option key={o} value={o} />)}</datalist>
                                                                        </div>
                                                                    ) : (
                                                                        <div className="relative">
                                                                            <input 
                                                                                className={`field-input ${errorFieldIds.has(f.id) ? 'has-error' : ''}`} 
                                                                                type={f.type} value={currentData[f.id] || ''} 
                                                                                onChange={e => updateField(f.id, e.target.value)} 
                                                                                readOnly={isReadOnly} 
                                                                                style={isReadOnly ? { background: '#fef9c3', cursor: 'not-allowed', color: '#854d0e', borderColor: '#fde047' } : {}} 
                                                                                onKeyDown={(e) => {
                                                                                    if (f.type === 'number' && (e.key === 'ArrowUp' || e.key === 'ArrowDown')) {
                                                                                        e.preventDefault();
                                                                                    }
                                                                                }}
                                                                                onWheel={(e) => {
                                                                                                if (f.type === 'number') e.target.blur();
                                                                                            }}
                                                                                />
                                                                            {f.suf && <span className="suffix">{f.suf}</span>}
                                                                        </div>
                                                                    )}
                                                                    {(() => {
                                                                        const helpVal = typeof f.help === 'function' ? f.help(currentData) : f.help;
                                                                        if (!helpVal) return null;
                                                                        if (typeof helpVal === 'object' && helpVal.wageInfo !== undefined) {
                                                                            return (<div>{helpVal.wageInfo && (<div style={{ fontSize: 11, fontWeight: 700, marginTop: 6, marginBottom: 4, padding: '8px 12px', borderRadius: 8, background: helpVal.wageInfo.ok ? 'rgba(16,185,129,0.1)' : 'rgba(239,68,68,0.1)', color: helpVal.wageInfo.ok ? '#059669' : '#dc2626', borderLeft: `3px solid ${helpVal.wageInfo.ok ? '#10b981' : '#ef4444'}` }}>{helpVal.wageInfo.ok ? '✅' : '❌'} {helpVal.wageInfo.msg}<br/><span style={{ fontWeight: 400, fontSize: 10 }}>※賃金は{MIN_WAGE_YEAR}時点の数値を参照しています</span></div>)}<div className="field-help">💡 {helpVal.baseMsg}</div></div>);
                                                                        }
                                                                        return <div className="field-help">💡 {helpVal}</div>;
                                                                    })()}
                                                                </div>
                                                            );
                                                            i++;
                                                        }
                                                        return rendered;
                                                    })()}
                                                </div>
                                            </div>
                                            <div>
                                                <div className="validation-panel">
                                                    <div style={{ fontSize: 11, fontWeight: 900, textTransform: 'uppercase', letterSpacing: '0.15em', marginBottom: 20, display: 'flex', alignItems: 'center', gap: 8 }}>
                                                        <span style={{ color: '#818cf8' }}>⚙️</span> Validation
                                                    </div>
                                                    {validationErrors.length === 0 ? (
                                                        <div style={{ textAlign: 'center', padding: '24px 0', color: '#34d399' }}>
                                                            <div style={{ fontSize: 48, opacity: 0.6, marginBottom: 8 }}>✓</div>
                                                            <div style={{ fontWeight: 900, fontSize: 13, letterSpacing: '0.05em' }}>ALL CLEARED</div>
                                                        </div>
                                                    ) : validationErrors.map((e, idx) => (
                                                        <div key={idx} className="error-item">
                                                            <span style={{ flexShrink: 0 }}>⚠️</span>
                                                            <span>{e.msg}</span>
                                                        </div>
                                                    ))}
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                )}
                            </>
                        ) : (
                            <div style={{ flex: 1, display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', color: '#e2e8f0' }}>
                                <div style={{ fontSize: 64, opacity: 0.15, marginBottom: 16 }}>📋</div>
                                <p style={{ fontSize: 11, fontWeight: 900, letterSpacing: '0.15em', textTransform: 'uppercase' }}>Select an item to edit</p>
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
