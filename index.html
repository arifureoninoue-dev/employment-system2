</head>

        const BUSINESS_UNITS = [
            { id: 'intern', name: '技能実習', color: '#2563eb', description: '実習実施者・送出機関向けの項目構成', icon: '🏢' },
            { id: 'skilled', name: '特定技能', color: '#0d9488', description: '支援計画書・雇用契約書向けの項目構成', icon: '⚡' }
        ];

        const TABS = [
            { id: 1, name: '基本情報', icon: '📋' },
            { id: 2, name: '生活環境・宿泊施設', icon: '🏠' },
            { id: 3, name: '労働時間・休憩・休日', icon: '⏰' },

            { id: 5, name: '募集要件', icon: '👥' },
            { id: 6, name: 'メモ', icon: '📝' },
        ];

        const isHalfWidth = (str) => !str || /^[a-zA-Z0-9!-/:-@[-`{-~\s]+$/.test(str);
        const isNumeric = (str) => !str || /^[0-9]+$/.test(str);
        const isZipCode = (str) => !str || /^\d{3}-\d{4}$/.test(str);
        const containsFullWidthLatin = (str) => /[０-９Ａ-Ｚａ-ｚ]/.test(str);

        const escapeCSV = (str) => {
            if (str == null) return '';
            const s = String(str);
            if (s.includes(',') || s.includes('"') || s.includes('\n')) return `"${s.replace(/"/g, '""')}"`;
            return s;
        };

        // ─── CSVパーサー（ダブルクォート対応） ───────────────────────────────
        const parseCSVLine = (line) => {
            const result = [];
            let cur = '';
            let inQuote = false;
            for (let i = 0; i < line.length; i++) {
                const ch = line[i];
                if (inQuote) {
                    if (ch === '"') {
                        if (line[i + 1] === '"') { cur += '"'; i++; }
                        else { inQuote = false; }
                    } else {
                        cur += ch;
                    }
                } else {
                    if (ch === '"') { inQuote = true; }
                    else if (ch === ',') { result.push(cur); cur = ''; }
                    else { cur += ch; }
                }
            }
            result.push(cur);
            return result;
        };

        const Notification = ({ message, type, onClose }) => {
            useEffect(() => {
                const t = setTimeout(onClose, 3000);
                return () => clearTimeout(t);
            }, [onClose]);
            const bg = type === 'error' ? '#ef4444' : type === 'warning' ? '#eab308' : '#10b981';
            return (
                <div className="notification" style={{ background: bg }}>
                    <span>{type === 'error' ? '⚠️' : '✓'}</span>
                    <span style={{ flex: 1 }}>{message}</span>
                    <button onClick={onClose} style={{ color: 'white', fontSize: 18, padding: '2px 6px', borderRadius: 6 }}>✕</button>
                </div>
            );
        };

        const App = () => {
            const [appMode, setAppMode] = useState(null);
            const [subMode, setSubMode] = useState(null);
            const [dataList, setDataList] = useState([]);
            const [currentId, setCurrentId] = useState(null);
            const [currentTab, setCurrentTab] = useState(1);
            const [notification, setNotification] = useState(null);
            const fileInputRef = useRef(null);
            const mainScrollRef = useRef(null);

            const currentData = useMemo(() => dataList.find(d => d.id === currentId) || null, [dataList, currentId]);
            const notify = (msg, type = 'success') => setNotification({ msg, type });

            const createNew = () => {
                const newId = `SF-${Math.random().toString(36).slice(2, 11).toUpperCase()}`;
                const newRecord = {
                    id: newId, bu: appMode, sub_type: subMode, createdAt: new Date().toISOString(),
                    company_name_en: 'Co., Ltd.', rep_position: '代表取締役',
                    housing_status: '未定',
                    regular_holiday_day: ['土曜日', '日曜日'],
                    has_shift: 'なし', has_bonus: 'なし', has_raise: 'なし', has_retirement: 'なし',
                    annual_leave: '10', resignation_notice_days: '30',
                    has_wage_deduction: 'あり', charges_utilities: 'あり'
                };
                setDataList(prev => [...prev, newRecord]);
                setCurrentId(newId);
                setCurrentTab(1);
                notify('新規レコードを作成しました');
            };

            const updateField = (fieldId, value) => {
                setDataList(prev => prev.map(d => {
                    if (d.id !== currentId) return d;
                    let newData = { ...d, [fieldId]: value };
                    if (fieldId === 'job_type') newData.work_name = '';
                    // 配属希望日の連動（基本情報タブ ↔ 募集要件タブ）
                    if (fieldId === 'desired_start_date') newData.placement_date = value;
                    if (fieldId === 'placement_date') newData.desired_start_date = value;
                    const hasCoLtd = (newData.company_name_en || '').includes("Co., Ltd.");
                    if (!hasCoLtd) newData.rep_position = '代表';
                    if (fieldId === 'business_type' && newData.business_type === '法人') newData.pension_type = '厚生年金';

                    if (fieldId === 'property_area' || fieldId === 'housing_residents') {
                        const area = parseFloat(newData.property_area);
                        const residents = parseFloat(newData.housing_residents);
                        newData.area_per_person = (area && residents && residents > 0) ? (area / residents).toFixed(2) : '';
                    }

                    const timeToMinutes = (t) => { if (!t) return null; const [h, m] = t.split(':').map(Number); return h * 60 + m; };

                    const breakFields = ['break_start_1','break_end_1','break_start_2','break_end_2','break_start_3','break_end_3','start_time','end_time'];
                    if (breakFields.includes(fieldId)) {
                        const bs1 = timeToMinutes(newData.break_start_1), be1 = timeToMinutes(newData.break_end_1);
                        const bs2 = timeToMinutes(newData.break_start_2), be2 = timeToMinutes(newData.break_end_2);
                        const bs3 = timeToMinutes(newData.break_start_3), be3 = timeToMinutes(newData.break_end_3);
                        let totalBreak = 0;
                        if (bs1 !== null && be1 !== null && be1 > bs1) totalBreak += be1 - bs1;
                        if (bs2 !== null && be2 !== null && be2 > bs2) totalBreak += be2 - bs2;
                        if (bs3 !== null && be3 !== null && be3 > bs3) totalBreak += be3 - bs3;
                        newData.break_total_minutes = totalBreak > 0 ? String(totalBreak) : '';
                        const startMin = timeToMinutes(newData.start_time), endMin = timeToMinutes(newData.end_time);
                        if (startMin !== null && endMin !== null && endMin > startMin) {
                            const workTotal = endMin - startMin - totalBreak;
                            if (workTotal >= 0) { newData.daily_work_hours = String(Math.floor(workTotal / 60)); newData.daily_work_minutes = (Math.floor(workTotal/60) === 8) ? '0' : String(workTotal % 60); }
                        }
                    }

                    if (fieldId === 'annual_work_hours' || fieldId === 'annual_work_minutes') {
                        const totalAnnualMin = (parseInt(newData.annual_work_hours) || 0) * 60 + (parseInt(newData.annual_work_minutes) || 0);
                        // 月所定労働時間：年÷12（変形労働制「有」の場合は手動修正も可）
                        const monthlyTotal = Math.round(totalAnnualMin / 12);
                        newData.monthly_work_hours = String(Math.floor(monthlyTotal / 60));
                        newData.monthly_work_minutes = String(monthlyTotal % 60);
                    }

                    // --- 週所定労働時間の自動計算 ---
                    const weeklyTriggers = [
                        'annual_holidays', 'daily_work_hours', 'daily_work_minutes',
                        'start_time', 'end_time', 'break_start_1', 'break_end_1',
                        'break_start_2', 'break_end_2', 'break_start_3', 'break_end_3'
                    ];
                    if (weeklyTriggers.includes(fieldId)) {
                        const holidays = parseFloat(newData.annual_holidays);
                        const dailyHours = parseFloat(newData.daily_work_hours) || 0;
                        const dailyMinutes = parseFloat(newData.daily_work_minutes) || 0;
                        
                        if (!isNaN(holidays)) {
                            const annualWorkDays = 365 - holidays; // 年間勤務日数
                            const dailyTotalMin = dailyHours * 60 + dailyMinutes; // 1日の所定労働時間(分)
                            if (dailyTotalMin > 0) {
                                // （年間勤務日数 / 365 × 7）× 1日の所定労働時間
                                const weeklyTotalMin = Math.round((annualWorkDays / 365 * 7) * dailyTotalMin);
                                newData.weekly_work_hours = String(Math.floor(weeklyTotalMin / 60));
                                newData.weekly_work_minutes = String(weeklyTotalMin % 60);
                            }
                        }
                    }

                    const otherBreakFields = ['other_break_start_1','other_break_end_1','other_break_start_2','other_break_end_2','other_break_start_3','other_break_end_3'];
                    if (otherBreakFields.includes(fieldId)) {
                        const obs1 = timeToMinutes(newData.other_break_start_1), obe1 = timeToMinutes(newData.other_break_end_1);
                        const obs2 = timeToMinutes(newData.other_break_start_2), obe2 = timeToMinutes(newData.other_break_end_2);
                        const obs3 = timeToMinutes(newData.other_break_start_3), obe3 = timeToMinutes(newData.other_break_end_3);
                        let otherBreak = 0;
                        if (obs1 !== null && obe1 !== null && obe1 > obs1) otherBreak += obe1 - obs1;
                        if (obs2 !== null && obe2 !== null && obe2 > obs2) otherBreak += obe2 - obs2;
                        if (obs3 !== null && obe3 !== null && obe3 > obs3) otherBreak += obe3 - obs3;
                        newData.other_break_total_minutes = otherBreak > 0 ? String(otherBreak) : '';
                    }

                    for (let i = 1; i <= 5; i++) {
                        const shiftBreakFields = [`shift_break_start_${i}_1`,`shift_break_end_${i}_1`,`shift_break_start_${i}_2`,`shift_break_end_${i}_2`,`shift_break_start_${i}_3`,`shift_break_end_${i}_3`,`shift_start_${i}`,`shift_end_${i}`];
                        if (shiftBreakFields.includes(fieldId)) {
                            const sbs1 = timeToMinutes(newData[`shift_break_start_${i}_1`]), sbe1 = timeToMinutes(newData[`shift_break_end_${i}_1`]);
                            const sbs2 = timeToMinutes(newData[`shift_break_start_${i}_2`]), sbe2 = timeToMinutes(newData[`shift_break_end_${i}_2`]);
                            const sbs3 = timeToMinutes(newData[`shift_break_start_${i}_3`]), sbe3 = timeToMinutes(newData[`shift_break_end_${i}_3`]);
                            let shiftBreak = 0;
                            if (sbs1 !== null && sbe1 !== null && sbe1 > sbs1) shiftBreak += sbe1 - sbs1;
                            if (sbs2 !== null && sbe2 !== null && sbe2 > sbs2) shiftBreak += sbe2 - sbs2;
                            if (sbs3 !== null && sbe3 !== null && sbe3 > sbs3) shiftBreak += sbe3 - sbs3;
                            newData[`shift_break_total_${i}`] = shiftBreak > 0 ? String(shiftBreak) : '';
                            const shiftStart = timeToMinutes(newData[`shift_start_${i}`]), shiftEnd = timeToMinutes(newData[`shift_end_${i}`]);
                            if (shiftStart !== null && shiftEnd !== null && shiftEnd > shiftStart) {
                                const workTotal = shiftEnd - shiftStart - shiftBreak;
                                if (workTotal >= 0) { newData[`shift_daily_hours_${i}`] = String(Math.floor(workTotal/60)); newData[`shift_daily_minutes_${i}`] = (Math.floor(workTotal/60) === 8) ? '0' : String(workTotal % 60); }
                            }
                        }
                    }

                    if (fieldId === 'desired_start_date' && newData.desired_start_date) {
                        const hire = new Date(newData.desired_start_date); hire.setMonth(hire.getMonth() + 1);
                        newData.health_checkup_hire = hire.toISOString().split('T')[0];
                        const first = new Date(hire); first.setFullYear(first.getFullYear() + 1);
                        newData.health_checkup_first = first.toISOString().split('T')[0];
                    }
                    if (fieldId === 'health_checkup_hire' && newData.health_checkup_hire) {
                        const hire = new Date(newData.health_checkup_hire);
                        const first = new Date(hire); first.setFullYear(first.getFullYear() + 1);
                        newData.health_checkup_first = first.toISOString().split('T')[0];
                    }

                    const pensionTriggers = ['pension_standard_remuneration', 'health_standard_remuneration'];
                    if (pensionTriggers.includes(fieldId)) {
                        const pension = parseFloat(newData.pension_standard_remuneration) || 0;
                        const health = parseFloat(newData.health_standard_remuneration) || 0;
                        newData.social_insurance_total = (pension > 0 || health > 0) ? String(Math.round(pension + health)) : '';
                    }

                    const annualMin = (parseInt(newData.annual_work_hours) || 0) * 60 + (parseInt(newData.annual_work_minutes) || 0);
                    const monthlyMin = (parseInt(newData.monthly_work_hours) || 0) * 60 + (parseInt(newData.monthly_work_minutes) || 0);
                    const salaryTriggers = ['payment_type','monthly_salary_1','monthly_salary_2','monthly_salary_3','hourly_salary_1','hourly_salary_2','hourly_salary_3','annual_work_hours','annual_work_minutes','monthly_work_hours','monthly_work_minutes'];
                    if (salaryTriggers.includes(fieldId)) {
                        if (newData.payment_type === '月給' && annualMin > 0) {
                            [1,2,3].forEach(n => { const m = parseFloat(newData[`monthly_salary_${n}`]); if (!isNaN(m) && m > 0) newData[`hourly_salary_${n}`] = (m * 12 / (annualMin / 60)).toFixed(2); });
                        }
                        if (newData.payment_type === '時給' && monthlyMin > 0) {
                            [1,2,3].forEach(n => { const h = parseFloat(newData[`hourly_salary_${n}`]); if (!isNaN(h) && h > 0) newData[`monthly_salary_${n}`] = (h * (monthlyMin / 60)).toFixed(0); });
                        }
                    }
                     // --- 手取り額の自動計算 ---
                    const netTriggers = [
                        'monthly_salary_1','monthly_salary_2','monthly_salary_3',
                        'social_insurance_total','income_tax','labor_insurance_total',
                        'housing_fee_monthly','other_cost_amount_1','other_cost_amount_2',
                        'other_cost_amount_3','other_cost_amount_4','has_other_fees',
                        'residence_status'
                    ];
                    if (netTriggers.includes(fieldId)) {
                        const salaryKey = newData.residence_status === '実習2号' ? 'monthly_salary_2'
                                        : newData.residence_status === '実習3号' ? 'monthly_salary_3'
                                        : 'monthly_salary_1';
                        const monthlySalary = parseFloat(newData[salaryKey]) || 0;
                        const socialInsurance = parseFloat(newData.social_insurance_total) || 0;
                        const incomeTax       = parseFloat(newData.income_tax) || 0;
                        const laborInsurance  = parseFloat(newData.labor_insurance_total) || 0;
                        const housingFee      = parseFloat(newData.housing_fee_monthly) || 0;
                        let otherCostTotal = 0;
                        if (newData.has_other_fees === 'あり') {
                            [1,2,3,4].forEach(n => {
                                otherCostTotal += parseFloat(newData[`other_cost_amount_${n}`]) || 0;
                            });
                        }
                        if (monthlySalary > 0) {
                            const net = monthlySalary - socialInsurance - incomeTax - laborInsurance - housingFee - otherCostTotal;
                            newData.net_income = String(Math.round(net));
                        }
                    }
                    return newData;
                }));
            };

            const updateMemo = (value) => {
                setDataList(prev => prev.map(d => d.id === currentId ? { ...d, _memo: value } : d));
            };

            const deleteRecord = (id) => {
                if (!confirm('このレコードを削除してもよろしいですか？')) return;
                setDataList(prev => prev.filter(d => d.id !== id));
                if (currentId === id) setCurrentId(null);
                notify('レコードを削除しました');
            };
            // ─── CSVエクスポート：bu列・_memo列を追加 ──────────────────
            const exportCSV = (hasError) => {
                try {
                    // ─── 取引先オブジェクト用列定義 ───────────────────────────────
                    const ACCOUNT_COLUMNS = [
                        'Name',
                        'EnglishName__c',
                    ];
                    // ─── ジョブオブジェクト用列定義 ──────────────────────────────
                    const JOB_COLUMNS = [
                        'Occupation_TT__c','WorkName_TT__c','dk_OfficeName__c',
                        'dk_Accommodations__c','dk_AccommodationId__c','ResidentialPropertyType__c',
                        'dk_AccommodationPostalCode__c','AccommodationName__c','AccommodationsAddress__c',
                        'AccommodationsArea__c','AccommodationCapacity__c',
                        'OverTimeWork__c','dk_IrregularWorkingHoursSystem__c','dk_IrregularWorkingHoursSystemType__c','WorkRules__c',
                        'dk_RegularDaysOff__c','dk_OtherRegularDaysOff__c',
                        'dk_JapaneseNationalHolidays__c','dk_AdditionalDaysOff__c','dk_NumberOfAdditionalDaysOff__c',
                        'dk_BasicOpeningTime__c','dk_BasicClosingTime__c',
                        'dk_BasicBreakStartTime__c','dk_BasicBreakEndTime1__c',
                        'dk_BasicBreakStartTime2__c','dk_BasicBreakEndTime2__c',
                        'dk_BasicBreakStartTime3__c','dk_BasicBreakEndTime3__c',
                        'dk_WeeklyScheduledWorkingHours__c','dk_WeeklyScheduledWorkingMinutes__c','MonthlyScheduledWorkingHours__c','MonthlyScheduledWorkingMinutes__c',
                        'dk_AnnualScheduledWorkingHours__c','dk_AnnualScheduledWorkingMinutes__c','TotalAnnualHoliday__c',
                        'dk_SaturdayWork__c',
                        'dk_OtherStartingTime__c','dk_OtherClosingTime__c',
                        'dk_OtherBreakStartTime1__c','dk_OtherBreakEndTime1__c',
                        'dk_OtherBreakStartTime2__c','dk_OtherBreakEndTime2__c',
                        'dk_OtherBreakStartTime3__c','dk_OtherBreakEndTime3__c',
                        'dk_ShiftSystem__c',
                        'dk_ShiftOpeningTime1__c','dk_ShiftClosingTime1__c','dk_ShiftSystemApplicationDate1__c',
                        'dk_ShiftBreakStartTime1__c','dk_ShiftBreakEndTime1__c',
                        'dk_ShiftBreakStartTime1_2__c','dk_ShiftBreakEndTime1_2__c',
                        'dk_ShiftBreakStartTime1_3__c','dk_ShiftBreakEndTime1_3__c',
                        'dk_ShiftOpeningTime2__c','dk_ShiftClosingTime2__c','dk_ShiftSystemApplicationDate2__c',
                        'dk_ShiftBreakStartTime2__c','dk_ShiftBreakEndTime2__c',
                        'dk_ShiftBreakStartTime2_2__c','dk_ShiftBreakEndTime2_2__c',
                        'dk_ShiftBreakStartTime2_3__c','dk_ShiftBreakEndTime2_3__c',
                        'dk_ShiftOpeningTime3__c','dk_ShiftClosingTime3__c','dk_ShiftSystemApplicationDate3__c',
                        'dk_ShiftBreakStartTime3__c','dk_ShiftBreakEndTime3__c',
                        'dk_ShiftBreakStartTime3_2__c','dk_ShiftBreakEndTime3_2__c',
                        'dk_ShiftBreakStartTime3_3__c','dk_ShiftBreakEndTime3_3__c',
                        'dk_ShiftOpeningTime4__c','dk_ShiftClosingTime4__c','dk_ShiftSystemApplicationDate4__c',
                        'dk_ShiftBreakStartTime4__c','dk_ShiftBreakEndTime4__c',
                        'dk_ShiftBreakStartTime4_2__c','dk_ShiftBreakEndTime4_2__c',
                        'dk_ShiftBreakStartTime4_3__c','dk_ShiftBreakEndTime4_3__c',
                        'dk_ShiftOpeningTime5__c','dk_ShiftClosingTime5__c','dk_ShiftSystemApplicationDate5__c',
                        'dk_ShiftBreakStartTime5__c','dk_ShiftBreakEndTime5__c',
                        'dk_ShiftBreakStartTime5_2__c','dk_ShiftBreakEndTime5_2__c',
                        'dk_ShiftBreakStartTime5_3__c','dk_ShiftBreakEndTime5_3__c',
                        'AnnualPaidLeave__c',
                        'dk_PaymentCategory__c',
                        'dk_MonthlyWage1__c','dk_DailyWage1__c','dk_HourlyWage1__c',
                        'dk_MonthlyWage2__c','dk_DailyWage2__c','dk_HourlyWage2__c',
                        'dk_MonthlyWage3__c','dk_DailyWage3__c','dk_HourlyWage3__c',
                        'Bonus__c','WageRaise__c','RetirementAllowance__c',
                        'AllowanceName1__c','dk_AllowanceAmount1__c','dk_AllowanceCalculationMethod1__c',
                        'AllowanceName2__c','dk_AllowanceAmount2__c','dk_AllowanceCalculationMethod2__c',
                        'AllowanceName3__c','dk_AllowanceAmount3__c','dk_AllowanceCalculationMethod3__c',
                        'AllowanceName4__c','dk_AllowanceAmount4__c','dk_AllowanceCalculationMethod4__c',
                        'dk_WagePaymentDeduction__c','dk_PensionInsurance__c','dk_HealthInsurance__c',
                        'OtherInsurance__c',
                        'ProvisionOfFood__c',
                        'dk_CollectionFeeOfHousingCosts__c','dk_HousingCostsExplanation__c',
                        'UtilityCost__c','UtilityCostType__c','dk_UtilityCostDetails__c',
                        'dk_CommunicationsCostType__c','dk_CommunicationsCostBurden__c',
                        'dk_OtherRecurringCosts__c',
                        'OtherBurdenCost1__c','dk_OtherBurdenCostType1__c','OtherBurdenCostAmount1__c',
                        'OtherBurdenCost2__c','dk_OtherBurdenCostType2__c','OtherBurdenCostAmount2__c',
                        'OtherBurdenCost3__c','dk_OtherBurdenCostType3__c','OtherBurdenCostAmount3__c',
                        'dk_OtherBurdenCostName4__c','dk_OtherBurdenCostType4__c','OtherBurdenCostAmount4__c',
                        'dk_BenefitOfOtherBurdenCosts__c','OtherBurdenCostExplanation__c',
                        'WagePaymentMethod__c',
                        'WageDeadline__c','WagePaymentDate__c',
                        'dk_WageDeadline2__c','dk_WagePaymentDate2__c',
                        'GraceDaysOfResignation__c',
                        'HealthCheckupPeriod__c',
                        'CompanyCulture_TT__c','RecordOfAcceptingForeigners_TT__c',
                        'TrainingContent_TT__c','TrainingPeriod_TT__c',
                        'HighPlaceWork_TT__c','OutdoorIndoorWorkRate_TT__c',
                        'OverTimeAndNightShift_TT__c',
                        'SharedMattersToSendingAgency__c',
                        'Gender__c','DesiredAge__c','BloodType__c',
                        'DesiredHeight__c','DesiredBodyWeight__c',
                        'DominantHand_TT__c','Glasses__c','Tattoo__c','Marriage_TT__c',
                        'Smoking__c','Drinking__c','FieldExperience_TT__c',
                        'dk_TotalBasicBreakTime__c', 'dk_ScheduledWorkingHoursPerDay__c', 'dk_ScheduledWorkingMinutesPerDay__c',
                        
                        'RecordTypeId', 'JobStatus__c', 'JobAcquisitionDate__c', 'BusinessType__c', 'ResponsibleBranch__c'
                    ];

                    // ─── 一時保存用列定義（既存のCSV_COLUMNS）────────────────────
                    const CSV_COLUMNS = FIELDS.filter(f => f.type !== 'section').map(f => f.sf);
                    const sfToId = {};
                    const fieldTypeMap = {};
                    const fieldDefMap = {};
                    FIELDS.filter(f => f.type !== 'section').forEach(f => { 
                        sfToId[f.sf] = f.id;
                        fieldTypeMap[f.id] = f.type;
                        fieldDefMap[f.id] = f;
                     });

                    // ─── 共通：行データ生成関数 ──────────────────────────────────
                    const buildWageText = (cutoffType, cutoffDay, paymentMonth, paymentDayType, paymentDay) => {
                        const cutoff = cutoffType === '末日' ? '末日' : (cutoffDay ? `当月${cutoffDay}日` : '');
                        const payment = paymentMonth && (paymentDayType === '末日' ? `${paymentMonth}末日` : (paymentDay ? `${paymentMonth}${paymentDay}日` : ''));
                        return { cutoff, payment };
                    };

                    const toolToSfMap = {
                        '男性': 'Male', '女性': 'Female',
                        '既婚可': '既婚', '必要': '要',
                    };

                    const fieldSpecificToSf = {
                        'irregular_holiday': { 'なし': '' }, // ★ 追加: 非定休日が「なし」なら空欄を出力
                    };

                    const buildRow = (d, columns, wageOverride, isSfExport = false) => {
                        const values = columns.map(sf => {
                            if (sf === '' || sf === '-') return '';
                            if (wageOverride && wageOverride[sf] !== undefined) return escapeCSV(wageOverride[sf]);
                            const fieldId = sfToId[sf];
                            if (!fieldId) return '';
                            
                            // ★ 変更：Salesforce向け出力の時だけ、非表示項目を空欄にする
                            if (isSfExport) {
                                const fieldDef = fieldDefMap[fieldId];
                                if (fieldDef && fieldDef.showIf && !fieldDef.showIf(d)) {
                                    return '';
                                }
                            }
                            
                            let val = d[fieldId];
                            if (isSfExport && fieldTypeMap[fieldId] === 'time' && val) {
                                // "09:00" のような形式を "09:00:00.000Z" に変換
                                if (/^\d{2}:\d{2}$/.test(val)) {
                                    val = `${val}:00.000Z`;
                                } else if (/^\d{2}:\d{2}:\d{2}$/.test(val)) {
                                    val = `${val}.000Z`;
                                }
                            }

                            if (Array.isArray(val)) return escapeCSV(val.join('・'));
                            let strVal = val != null ? String(val) : '';
                            
                            // ★ 変更: Salesforce出力の時のみ、文言の変換（あり/なし/空欄など）を実行する
                            if (isSfExport) {
                                if (fieldSpecificToSf[fieldId] && fieldSpecificToSf[fieldId][strVal] !== undefined) {
                                    strVal = fieldSpecificToSf[fieldId][strVal];
                                } else if (toolToSfMap[strVal] !== undefined) {
                                    strVal = toolToSfMap[strVal];
                                }
                            }
                            return escapeCSV(strVal);
                        });
                        return values;
                    };

                    const targetRecords = dataList.filter(d => d.bu === appMode && (appMode !== 'skilled' || d.sub_type === subMode));
                    const dateStr = new Date().toISOString().split('T')[0];

                    const downloadCSV = (filename, header, rows) => {
                        const csv = '\uFEFF' + [header, ...rows].join('\n');
                        const url = URL.createObjectURL(new Blob([csv], { type: 'text/csv;charset=utf-8' }));
                        const a = document.createElement('a');
                        a.href = url;
                        a.download = filename;
                        a.click();
                        URL.revokeObjectURL(url);
                    };

                    const saveHeader = ['ID', 'bu', 'sub_type', ...CSV_COLUMNS,  '_memo'].join(',');
                    const saveRows = targetRecords.map(d => {
                        const fieldValues = buildRow(d, CSV_COLUMNS, null, false);
                        return [escapeCSV(d.id), escapeCSV(d.bu), escapeCSV(d.sub_type || ''), ...fieldValues, escapeCSV(d._memo || '')].join(',');
                    });
                    downloadCSV(`SF_Save_${appMode}_${dateStr}.csv`, saveHeader, saveRows);
                    // ★ エラーがある場合はここで処理を終了し、メッセージを表示
                    if (hasError) {
                        notify('エラーがあるため、一時保存用CSVのみ出力しました', 'warning');
                        return;
                    }

                    // ※ 取引先はNameが必須IDとして先頭に来ることが多いため、headerはAPI名のみ
                    const accountHeader2 = ACCOUNT_COLUMNS.join(',');
                    const accountRows = targetRecords.map(d =>
                        buildRow(d, ACCOUNT_COLUMNS, null, true).join(',')
                    );
                    downloadCSV(`SF_Account_${appMode}_${dateStr}.csv`, accountHeader2, accountRows);

                    // ③ ジョブ用CSV
                    const jobWageOverrideFor = (d) => {
                        const w1 = buildWageText(d.wage_cutoff_type_1, d.wage_cutoff_day_1, d.wage_payment_month_1, d.wage_payment_day_type_1, d.wage_payment_day_1);
                        const w2 = buildWageText(d.wage_cutoff_type_2, d.wage_cutoff_day_2, d.wage_payment_month_2, d.wage_payment_day_type_2, d.wage_payment_day_2);
                        const extraNotes = [];
                        if (d.high_altitude_height) extraNotes.push(`高所作業の高さ: ${d.high_altitude_height}m`);
                        if (d.avg_overtime_hours) extraNotes.push(`残業月平均: ${d.avg_overtime_hours}時間`);
                        if (d.nightshift_count) extraNotes.push(`夜勤月回数: ${d.nightshift_count}回`);
                        if (d.priority_1) extraNotes.push(`優先順位1: ${d.priority_1}`);
                        if (d.priority_2) extraNotes.push(`優先順位2: ${d.priority_2}`);
                        if (d.priority_3) extraNotes.push(`優先順位3: ${d.priority_3}`);
                        // もともと「送出機関への共有事項」に入力されていたテキストがあれば繋げる
                        let sharedMatters = d.sending_org_notes || '';
                        if (extraNotes.length > 0) {
                            if (sharedMatters) sharedMatters += '\n\n';
                            sharedMatters += extraNotes.join('\n');
                        }
                        return {
                            'WageDeadline__c': w1.cutoff, 'WagePaymentDate__c': w1.payment,
                            'dk_WageDeadline2__c': w2.cutoff, 'dk_WagePaymentDate2__c': w2.payment,
                            'RecordTypeId': '012TL00000ASkGgYAL',
                            'JobStatus__c': 'オープン',
                            'JobAcquisitionDate__c': dateStr, // エクスポートした日付（YYYY-MM-DD）
                            'BusinessType__c': 'TechnicalInternTraining',
                            'ResponsibleBranch__c': 'GS',
                            'SharedMattersToSendingAgency__c': sharedMatters
                        };
                    };
                    const jobHeader = JOB_COLUMNS.join(',');
                    const jobRows = targetRecords.map(d =>
                        buildRow(d, JOB_COLUMNS, jobWageOverrideFor(d), true).join(',')
                    );
                    downloadCSV(`SF_Job_${appMode}_${dateStr}.csv`, jobHeader, jobRows);
                    notify('Salesforceインポート用を含む3ファイルを出力しました', 'success');
                } catch (e) {
                    console.error(e);
                    notify('CSVの出力に失敗しました', 'error');
                }
            };
            // ─── 【変更②】CSVインポート ──────────────────────────────────────────
            const importCSV = (e) => {
            const file = e.target.files[0];
            if (!file) return;
            e.target.value = '';

            const reader = new FileReader();
            reader.onload = (evt) => {
                try {
                    // BOM除去
                    const text = evt.target.result.replace(/^\uFEFF/, '');
                    const lines = text.split('\n').filter(l => l.trim() !== '');
                    if (lines.length < 2) { notify('データが含まれていません', 'error'); return; }

                    // ─── フォーマット判定 ──────────────────────────────────────
                    // ツール出力CSV：1行目がAPI名（'ID'列を含む）
                    // Salesforce出力CSV：1行目が日本語表示名、2行目がAPI名
                    const firstRowCells = parseCSVLine(lines[0]);
                    const isSalesforceFormat = !firstRowCells.includes('ID') && !firstRowCells.includes('bu');

                    let apiHeaders;   // API名の行
                    let dataStartRow; // データ開始行インデックス

                    if (isSalesforceFormat) {
                        // Salesforce形式：2行目がAPI名、3行目〜がデータ
                        if (lines.length < 3) { notify('データが含まれていません', 'error'); return; }
                        apiHeaders = parseCSVLine(lines[1]);
                        dataStartRow = 2;
                    } else {
                        // ツール出力形式：1行目がAPI名、2行目〜がデータ
                        apiHeaders = firstRowCells;
                        dataStartRow = 1;
                    }

                    // sf → id の逆引きマップを生成
                    const sfToId = {};
                    const fieldTypeMap = {}; // ★フィールドの型を判定するためのマップ
                    FIELDS.filter(f => f.type !== 'section').forEach(f => { 
                        sfToId[f.sf] = f.id; 
                        fieldTypeMap[f.id] = f.type;
                    });

                    // 列インデックスを取得（ツール出力形式のみ存在）
                    const idxId   = apiHeaders.indexOf('ID');
                    const idxBu   = apiHeaders.indexOf('bu');
                    const idxSubType = apiHeaders.indexOf('sub_type');
                    const idxMemo = apiHeaders.indexOf('_memo');

                    let importedCount = 0;
                    let skippedCount = 0;
                    const newRecords = [];

                    for (let i = dataStartRow; i < lines.length; i++) {
                        const values = parseCSVLine(lines[i]);
                        if (values.length < 2) continue;

                        const rowId = idxId >= 0 ? values[idxId] : null;
                        const rowBu = idxBu >= 0 ? values[idxBu] : null;
                        const rowSubType = idxSubType >= 0 ? values[idxSubType] : null; 

                        // ツール出力形式のみbuチェック（Salesforce形式は現在のappModeで取り込む）
                        if (!isSalesforceFormat && rowBu !== appMode) {
                            skippedCount++;
                            continue;
                        }

                        // 新規IDを発行
                        const newId = `SF-${Math.random().toString(36).slice(2, 11).toUpperCase()}`;

                        const record = {
                            id: newId,
                            bu: isSalesforceFormat ? appMode : rowBu,
                            sub_type: isSalesforceFormat ? subMode : rowSubType,
                            createdAt: new Date().toISOString(),
                            _originalId: rowId,
                        };

                        // 各カラムをフィールドIDにマッピング
                            // 各カラムをフィールドIDにマッピング
                            apiHeaders.forEach((sfName, colIdx) => {
                                if (sfName === 'ID' || sfName === 'bu' || sfName === '_memo') return;
                                const fieldId = sfToId[sfName];
                                if (!fieldId) return;
                                let rawVal = values[colIdx] || '';
                                if (MULTISELECT_FIELD_IDS.includes(fieldId)) {
                                    const sep = isSalesforceFormat ? '、' : '・';
                                    let vals = rawVal ? rawVal.split(sep) : [];
                                    // Salesforce形式：「月」→「月曜日」のように「曜日」を補完
                                    if (isSalesforceFormat && fieldId === 'regular_holiday_day') {
                                        vals = vals.map(v => v.length === 1 ? v + '曜日' : v);
                                    }
                                    record[fieldId] = vals;
                                } else {
                                    if (isSalesforceFormat) {
                                        // ★ 変更：時刻の復元処理を isSalesforceFormat の中に移動
                                        if (fieldTypeMap[fieldId] === 'time' && rawVal) {
                                            const timeMatch = rawVal.match(/^(\d{1,2}):(\d{1,2})/);
                                            if (timeMatch) {
                                                rawVal = timeMatch[1].padStart(2, '0') + ':' + timeMatch[2].padStart(2, '0');
                                            }
                                        }
                                            // カンマ付き数値のカンマを除去
                                            rawVal = rawVal.replace(/^[\d,]+$/, v => v.replace(/,/g, ''));
                                        // SF値 → ツール値 の共通変換マップ
                                        const sfValMap = {
                                            'Male': '男性', 'Female': '女性',
                                            '既婚': '既婚可', '要': '必要',
                                        };
                                        if (sfValMap[rawVal] !== undefined) rawVal = sfValMap[rawVal];
                                        if (fieldId === 'irregular_holiday' && rawVal === '') rawVal = 'なし';  
                                    }
                                    record[fieldId] = rawVal;
                                }
                            });

                        // _memo の復元（ツール出力形式のみ）
                        if (idxMemo >= 0) record._memo = values[idxMemo] || '';

                        // 年所定労働時間から月所定労働時間を自動計算
                        if (isSalesforceFormat) {
                            const annMin = (parseInt(record.annual_work_hours) || 0) * 60 + (parseInt(record.annual_work_minutes) || 0);
                            if (annMin > 0) {
                                const mTotal = Math.round(annMin / 12);
                                record.monthly_work_hours = String(Math.floor(mTotal / 60));
                                record.monthly_work_minutes = String(mTotal % 60);
                            }
                        }
                        // 手取り額の自動計算（インポート時）
                        if (isSalesforceFormat) {
                            const salaryKey = record.residence_status === '実習2号' ? 'monthly_salary_2'
                                            : record.residence_status === '実習3号' ? 'monthly_salary_3'
                                            : 'monthly_salary_1';
                            const monthlySalary = parseFloat(record[salaryKey]) || 0;
                            const socialInsurance = parseFloat(record.social_insurance_total) || 0;
                            const incomeTax       = parseFloat(record.income_tax) || 0;
                            const laborInsurance  = parseFloat(record.labor_insurance_total) || 0;
                            const housingFee      = parseFloat(record.housing_fee_monthly) || 0;
                            let otherCostTotal = 0;
                            if (record.has_other_fees === 'あり') {
                                [1,2,3,4].forEach(n => {
                                    otherCostTotal += parseFloat(record[`other_cost_amount_${n}`]) || 0;
                                });
                            }
                            if (monthlySalary > 0) {
                                const net = monthlySalary - socialInsurance - incomeTax - laborInsurance - housingFee - otherCostTotal;
                                record.net_income = String(Math.round(net));
                            }
                        }
                        newRecords.push(record);
                        importedCount++;
                    }

                    if (importedCount === 0) {
                        const detail = skippedCount > 0 ? `（${skippedCount}件はモード不一致でスキップ）` : '';
                        notify(`読み込めるレコードがありませんでした${detail}`, 'warning');
                        return;
                    }

                    setDataList(prev => [...prev, ...newRecords]);
                    setCurrentId(newRecords[0].id);
                    setCurrentTab(1);

                    const formatLabel = isSalesforceFormat ? '（Salesforce形式）' : '';
                    const skipLabel = skippedCount > 0 ? `（${skippedCount}件はモード不一致でスキップ）` : '';
                    notify(`${importedCount}件を読み込みました${formatLabel}${skipLabel}`);
                } catch (err) {
                    console.error(err);
                    notify('CSVの読み込みに失敗しました', 'error');
                }
            };
            reader.readAsText(file, 'Shift_JIS');
        };

            const validate = (data) => {
                const errors = [];
                if (!data) return errors;
                FIELDS.filter(f => f.bu?.includes(data.bu)).forEach(f => {
                    if (f.showIf && !f.showIf(data)) return;
                    const val = data[f.id];
                    const isEmpty = !val || (Array.isArray(val) && val.length === 0);
                    if (f.req && isEmpty) errors.push({ field: f.id, msg: `${f.label}は必須項目です。` });
                    if (f.req_cond && f.req_cond(data) && isEmpty) errors.push({ field: f.id, msg: `${f.label}は必須項目です。` });
                    if (data[f.id] && f.val === 'noFullLatin' && containsFullWidthLatin(data[f.id])) errors.push({ field: f.id, msg: `${f.label}に含まれる英数字は半角で入力してください（全角が含まれています）。` });
                    if (data[f.id] && f.val === 'half' && !isHalfWidth(data[f.id])) errors.push({ field: f.id, msg: `${f.label}は半角英数字のみです。` });
                    if (data[f.id] && f.val === 'num' && !isNumeric(data[f.id])) errors.push({ field: f.id, msg: `${f.label}は半角数字のみです。` });
                    if (data[f.id] && f.val === 'zip' && !isZipCode(data[f.id])) errors.push({ field: f.id, msg: `${f.label}は「000-0000」の形式（半角数字3桁＋ハイフン＋4桁）で入力してください。` });
                });
                const LAW_MSG = '労働基準法に違反していないか確認をしてください';
                const dwh = parseInt(data.daily_work_hours), dwm = parseInt(data.daily_work_minutes);
                if (!isNaN(dwh) && dwh > 8) errors.push({ field: 'daily_work_hours', msg: `1日の所定労働時間が8時間を超えています。${LAW_MSG}` });
                if (!isNaN(dwh) && !isNaN(dwm) && dwh === 8 && dwm > 0) errors.push({ field: 'daily_work_minutes', msg: `1日の所定労働時間が8時間を超えています。${LAW_MSG}` });
                const wwh = parseInt(data.weekly_work_hours), wwm = parseInt(data.weekly_work_minutes);
                if (!isNaN(wwh) && wwh > 40) errors.push({ field: 'weekly_work_hours', msg: `週所定労働時間が40時間を超えています。${LAW_MSG}` });
                if (!isNaN(wwh) && !isNaN(wwm) && wwh === 40 && wwm > 0) errors.push({ field: 'weekly_work_minutes', msg: `週所定労働時間が40時間を超えています。${LAW_MSG}` });
                const ayh = parseInt(data.annual_work_hours), aym = parseInt(data.annual_work_minutes);
                if (!isNaN(ayh) && ayh > 2085) errors.push({ field: 'annual_work_hours', msg: `年所定労働時間が2085時間を超えています。${LAW_MSG}` });
                if (!isNaN(ayh) && !isNaN(aym) && ayh === 2085 && aym > 42) errors.push({ field: 'annual_work_minutes', msg: `年所定労働時間が2085時間42分を超えています。${LAW_MSG}` });
                const ah = parseInt(data.annual_holidays);
                if (!isNaN(ah)) {
                    if (ah <= 52) errors.push({ field: 'annual_holidays', msg: `年間休日数が52日以下です。${LAW_MSG}` });
                    const holidays = data.national_holidays === '祝日休み';
                    const selectedDays = Array.isArray(data.regular_holiday_day) ? data.regular_holiday_day.length : 0;
                    if (holidays && selectedDays >= 2 && ah <= 120) errors.push({ field: 'annual_holidays', msg: `祝日休み・週2日休みの設定で年間休日が120日以下です。${LAW_MSG}` });
                    const dwh = parseInt(data.daily_work_hours) || 0;
                    const dwm = parseInt(data.daily_work_minutes) || 0;
                    const inputAnnualMin = (parseInt(data.annual_work_hours) || 0) * 60 + (parseInt(data.annual_work_minutes) || 0);

                    // 入力値が存在し、かつ「交代制」と「変形労働制」ではない場合のみ計算
                    if (inputAnnualMin > 0 && (dwh > 0 || dwm > 0) && data.has_shift === 'なし' && data.has_flex_time === 'なし') {
                        let satMin = 0;
                        if (data.saturday_work === 'あり' && data.other_start_time && data.other_end_time) {
                            const t2m = (t) => { if(!t) return 0; const [h,m] = t.split(':').map(Number); return h * 60 + m; };
                            const s = t2m(data.other_start_time);
                            const e = t2m(data.other_end_time);
                            const b = parseInt(data.other_break_total_minutes) || 0;
                            if (e > s) satMin = Math.max(0, e - s - b);
                        }

                        const totalWorkDays = 365 - ah; // 1年の総出勤日数
                        let weekdayDays = 0;
                        let satDays = 0;

                        if (data.saturday_work === 'あり') {
                            if (totalWorkDays > 260) {
                                weekdayDays = 260; // 平日は最大260日
                                satDays = totalWorkDays - 260; // はみ出た分を土曜出勤とする
                            } else {
                                weekdayDays = totalWorkDays;
                                satDays = 0;
                            }
                        } else {
                            weekdayDays = totalWorkDays;
                            satDays = 0;
                        }

                        // 土曜出勤「あり」でも時間が未入力の場合は一時的にエラーをスキップする（入力途中の混乱を防ぐため）
                        const canCalculate = data.saturday_work === 'なし' || (data.saturday_work === 'あり' && satMin > 0);

                        if (canCalculate) {
                            const calcTotalMin = (weekdayDays * (dwh * 60 + dwm)) + (satDays * satMin);
                            if (calcTotalMin !== inputAnnualMin) {
                                const calcH = Math.floor(calcTotalMin / 60);
                                const calcM = calcTotalMin % 60;
                                const timeStr = calcM > 0 ? `${calcH}時間${calcM}分` : `${calcH}時間`;
                                
                                let detailStr = `平日${weekdayDays}日×1日の所定時間`;
                                if (satDays > 0) {
                                    detailStr += ` ＋ 土曜出勤${satDays}日×土曜日の所定時間`;
                                }
                                
                                errors.push({
                                    field: 'annual_work_hours',
                                    msg: `年所定労働時間が正しくありません。理論値は【 ${timeStr} 】です。（計算式: 365日 - 休日${ah}日 = 出勤${totalWorkDays}日 / 内訳: ${detailStr}）`
                                });
                            }
                        }
                    }
                }
                const nightCount = parseInt(data.nightshift_count);
                if (data.has_shift === 'あり' && data.health_checkup_schedule === '1年' && !isNaN(nightCount) && nightCount > 4 && !data.health_checkup_schedule_confirmed) {
                    errors.push({ field: 'health_checkup_schedule', msg: `夜勤が月${nightCount}回あります。交代制勤務で夜勤が月4回を超える場合、健康診断は「半年」が推奨されます。問題なければ確認済みにチェックしてください。` });
                }
                const pref = PREFECTURES.find(p => (data.address || '').includes(p));
                if (pref) {
                    const minWage = MIN_WAGE_MASTER[pref];
                    ['1','2','3'].forEach(n => {
                        const hourly = parseFloat(data[`hourly_salary_${n}`]);
                        if (!isNaN(hourly) && hourly > 0 && hourly < minWage) errors.push({ field: `hourly_salary_${n}`, msg: `時給額(実習${n}号) ${hourly}円が${pref}の最低賃金(${MIN_WAGE_YEAR}: ${minWage}円)を下回っています。` });
                    });
                }
                return errors;
            };

            if (!appMode) {
                return (
                    <div className="home-screen">
                        <div style={{ maxWidth: 800, width: '100%', textAlign: 'center' }}>
                            <h1 style={{ fontSize: 48, fontWeight: 900, color: 'white', marginBottom: 8, letterSpacing: '-0.05em', fontStyle: 'italic' }}>CONTRACT MASTER</h1>
                            <p style={{ color: '#64748b', marginBottom: 40, fontSize: 14 }}>雇用契約書作成システム</p>
                            <div className="home-grid">
                                {BUSINESS_UNITS.map(bu => (
                                    <button key={bu.id} className="home-card" onClick={() => setAppMode(bu.id)}>
                                        <div className="icon-box" style={{ background: bu.color }}>{bu.icon}</div>
                                        <h2 style={{ fontSize: 22, fontWeight: 700, color: 'white', marginBottom: 8 }}>{bu.name}</h2>
                                        <p style={{ color: '#64748b', fontSize: 13, marginBottom: 32 }}>{bu.description}</p>
                                        <div style={{ color: '#818cf8', fontWeight: 700, fontSize: 11, letterSpacing: '0.1em', display: 'flex', alignItems: 'center', gap: 6 }}>START CREATION <span>→</span></div>
                                    </button>
                                ))}
                            </div>
                        </div>
                    </div>
                );
            }
            if (appMode === 'skilled' && !subMode) {
                return (
                    <div className="home-screen">
                        <div style={{ maxWidth: 800, width: '100%', textAlign: 'center' }}>
                            <button onClick={() => setAppMode(null)} style={{ color: '#94a3b8', marginBottom: 24, fontSize: 12, fontWeight: 700, letterSpacing: '0.1em', textTransform: 'uppercase' }}>← Back to Main Menu</button>
                            <h1 style={{ fontSize: 36, fontWeight: 900, color: 'white', marginBottom: 8, letterSpacing: '-0.05em' }}>SELECT CATEGORY</h1>
                            <p style={{ color: '#64748b', marginBottom: 40, fontSize: 14 }}>これから行う特定技能の手続きを選択してください</p>
                            <div className="home-grid">
                                <button className="home-card" onClick={() => setSubMode('海外招聘(LV)')}>
                                    <div className="icon-box" style={{ background: '#0891b2' }}>✈️</div>
                                    <h2 style={{ fontSize: 22, fontWeight: 700, color: 'white', marginBottom: 8 }}>海外招聘(LV)</h2>
                                    <p style={{ color: '#64748b', fontSize: 13, marginBottom: 32 }}>海外から新たに人材を呼び寄せる場合(有料職業紹介)</p>
                                    <div style={{ color: '#818cf8', fontWeight: 700, fontSize: 11, letterSpacing: '0.1em', display: 'flex', alignItems: 'center', gap: 6 }}>PROCEED <span>→</span></div>
                                </button>
                                <button className="home-card" onClick={() => setSubMode('特定技能')}>
                                    <div className="icon-box" style={{ background: '#0d9488' }}>🇯🇵</div>
                                    <h2 style={{ fontSize: 22, fontWeight: 700, color: 'white', marginBottom: 8 }}>特定技能(AJS)</h2>
                                    <p style={{ color: '#64748b', fontSize: 13, marginBottom: 32 }}>在留資格認定/変更・無料職業紹介の場合</p>
                                    <div style={{ color: '#818cf8', fontWeight: 700, fontSize: 11, letterSpacing: '0.1em', display: 'flex', alignItems: 'center', gap: 6 }}>PROCEED <span>→</span></div>
                                </button>
                            </div>
                        </div>
                    </div>
                );
            }

            const activeBU = BUSINESS_UNITS.find(b => b.id === appMode);
            const buRecords = dataList.filter(d => d.bu === appMode && (appMode !== 'skilled' || d.sub_type === subMode));
            const tabFields = FIELDS.filter(f => f.tab === currentTab && f.bu?.includes(appMode));
            const validationErrors = validate(currentData);
            const errorFieldIds = new Set(validationErrors.map(e => e.field));

            return (
                <div style={{ display: 'flex', height: '100vh', background: 'white' }}>
                    {notification && <Notification message={notification.msg} type={notification.type} onClose={() => setNotification(null)} />}

                    <div className="sidebar">
                        <div style={{ padding: 24 }}>
                            <button onClick={() => {
                                // 特定技能の場合は1つ前のサブメニュー画面に戻る
                                if (appMode === 'skilled') {
                                    setSubMode(null);
                                } else {
                                    setAppMode(null);
                                }
                                setCurrentId(null);
                            }} style={{ fontSize: 11, fontWeight: 900, color: '#94a3b8', letterSpacing: '0.1em', textTransform: 'uppercase', display: 'flex', alignItems: 'center', gap: 4, marginBottom: 24 }}>← Back</button>
                            <div style={{ display: 'flex', alignItems: 'center', gap: 12, marginBottom: 24 }}>
                                <div className="icon-box-sm" style={{ background: activeBU.color, color: 'white' }}>{activeBU.icon}</div>
                                <h1 style={{ fontSize: 16, fontWeight: 900, letterSpacing: '-0.03em' }}>{activeBU.name} {subMode ? `- ${subMode}` : ''}</h1>
                            </div>
                            {/* ─── 【変更③】LOADボタンを実際のインポート処理に接続 ─── */}
                            <div className="grid-2">
                                <button onClick={createNew} style={{ background: '#4f46e5', color: 'white', fontWeight: 900, padding: '12px 8px', borderRadius: 12, fontSize: 11, display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 4 }}>
                                    <span style={{ fontSize: 20 }}>＋</span> NEW
                                </button>

                        <div style={{ padding: 20, background: 'white', borderTop: '1px solid #e2e8f0' }}>

                                disabled={buRecords.length === 0} 
                                onClick={() => exportCSV(validationErrors.length > 0)}
